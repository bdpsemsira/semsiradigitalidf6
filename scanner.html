<!DOCTYPE html>
<html lang="ms">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Semsira Scanner</title>
    <script src="https://unpkg.com/html5-qrcode"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        :root {
            --primary: #007AFF;
            --success: #34C759;
            --error: #FF3B30;
            --bg: #F2F2F7;
        }

        body {
            font-family: -apple-system, sans-serif;
            background-color: var(--bg);
            margin: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
        }

        /* 紧凑型 Header 样式 */
        .header {
            width: 100%;
            padding: 10px 0; /* 缩小高度 */
            background: white;
            box-shadow: 0 2px 5px rgba(0,0,0,0.1);
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 12px;
        }

        .header img {
            width: 45px; /* 缩小 Logo */
            height: 45px;
            border-radius: 8px;
            box-shadow: 0 1px 4px rgba(0,0,0,0.1);
        }

        .header-text h2 {
            margin: 0;
            font-size: 18px; /* 略微缩小字号 */
        }

        .header-text p {
            margin: 0;
            font-size: 12px;
            color: #888;
        }

        .camera-controls {
            width: 90%;
            max-width: 500px;
            margin-top: 10px;
            display: flex;
            flex-direction: column;
            gap: 10px;
        }

        select {
            padding: 10px;
            border-radius: 10px;
            border: 1px solid #CCC;
            font-size: 14px;
            background: white;
        }

        #reader {
            width: 90%;
            max-width: 500px;
            margin: 15px auto;
            border-radius: 15px;
            overflow: hidden;
            border: none !important;
            box-shadow: 0 4px 10px rgba(0,0,0,0.1);
        }

        .result-card {
            width: 85%;
            max-width: 400px;
            background: white;
            padding: 15px;
            border-radius: 15px;
            margin-top: 5px;
            min-height: 120px; 
            display: flex;
            flex-direction: column;
            justify-content: center;
            box-shadow: 0 4px 15px rgba(0,0,0,0.1);
            text-align: center;
        }

        .status-icon {
            width: 50px;
            height: 50px;
            margin: 0 auto 5px;
            display: flex;
            align-items: center;
            justify-content: center;
            border-radius: 50%;
        }

        .success { color: var(--success); border: 2px solid var(--success); }
        .error { color: var(--error); border: 2px solid var(--error); }
    </style>
</head>
<body>

<div class="header">
    <img src="/semsira.png" alt="Logo Semsira">
    <div class="header-text">
        <h2>Semsira Attendance</h2>
        <p>Sila pilih kamera & imbas QR</p>
    </div>
</div>

<div class="camera-controls">
    <select id="camera-select">
        <option value="">Mengesan Kamera...</option>
    </select>
</div>

<div id="reader"></div>

<div id="result-card" class="result-card">
    <div id="status-icon" class="status-icon">
        <i data-lucide="qr-code" style="color:#ccc"></i>
    </div>
    <h3 id="res-name" style="margin:5px 0; color:#888; font-size: 16px;">Menunggu imbasan...</h3>
    <p id="res-msg" style="margin:2px 0; font-size:14px; color:#666"></p>
    <p id="res-time" style="font-size:12px; color:#999"></p>
</div>

<audio id="beep-sound" src="/beep.mp3" preload="auto"></audio>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
    import { getFirestore, collection, query, where, getDocs, addDoc, serverTimestamp, doc, getDoc } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

    const firebaseConfig = {
        apiKey: "AIzaSyCqY9ADs8oy1Uvh3-7eVCQLYfyTijm8lo4",
        authDomain: "bdpsemsira-5c274.firebaseapp.com",
        projectId: "bdpsemsira-5c274",
        storageBucket: "bdpsemsira-5c274.firebasestorage.app",
        messagingSenderId: "176946808975",
        appId: "1:176946808975:web:ef7447a11bb57fe71b88fa"
    };

    const app = initializeApp(firebaseConfig);
    const db = getFirestore(app);

    const html5QrCode = new Html5Qrcode("reader");
    const cameraSelect = document.getElementById('camera-select');
    const beepSound = document.getElementById('beep-sound');
    let isProcessing = false;
    let currentCameraId = null;

    lucide.createIcons();

    Html5Qrcode.getCameras().then(cameras => {
        if (cameras && cameras.length > 0) {
            cameraSelect.innerHTML = cameras.map(cam => `<option value="${cam.id}">${cam.label}</option>`).join('');
            startScanning(cameras[0].id);
        } else {
            cameraSelect.innerHTML = '<option value="">Tiada Kamera Dikesan</option>';
        }
    }).catch(err => {
        console.error("Gagal dpt kamera", err);
    });

    cameraSelect.addEventListener('change', (e) => {
        if (e.target.value) {
            html5QrCode.stop().then(() => startScanning(e.target.value));
        }
    });

    function startScanning(cameraId) {
        currentCameraId = cameraId;
        html5QrCode.start(
            cameraId, 
            { fps: 10, qrbox: { width: 250, height: 250 } }, 
            onScanSuccess
        );
    }

    async function onScanSuccess(decodedText) {
        if (isProcessing) return;
        isProcessing = true;

        showResult("Processing...", "Mengesahkan QR...", "wait");

        try {
            const parts = decodedText.split('|');
            if (parts.length < 2) throw new Error("Format Kod QR Tidak Sah");

            const scannedIC = parts[0];
            const qrTimeStr = parts[1];

            if (!validateTime(qrTimeStr, 10)) {
                throw new Error("Kod Tamat Tempoh. Sila guna kod baru.");
            }

            const timeSettingsSnap = await getDoc(doc(db, "systemSettings", "attendance_time"));
            let lateThreshold = "07:30"; 
            let absentThreshold = "08:30"; 

            if (timeSettingsSnap.exists()) {
                lateThreshold = timeSettingsSnap.data().lateTime;
                absentThreshold = timeSettingsSnap.data().absentTime;
            }

            const now = new Date();
            const currentTimeStr = `${String(now.getHours()).padStart(2, '0')}:${String(now.getMinutes()).padStart(2, '0')}`;

            if (currentTimeStr > absentThreshold) {
                throw new Error(`Masa tamat (${absentThreshold}). Anda dikira Tidak Hadir.`);
            }

            let attendanceStatus = "Hadir";
            if (currentTimeStr > lateThreshold) {
                attendanceStatus = "Lewat";
            }

            const todayStr = now.toISOString().split('T')[0];
            const checkQuery = query(
                collection(db, "attendanceLogs"), 
                where("ic", "==", scannedIC),
                where("date", "==", todayStr)
            );
            
            const existingDocs = await getDocs(checkQuery);
            if (!existingDocs.empty) {
                throw new Error("Anda sudah melakukan pendaftaran masuk hari ini.");
            }

            const q = query(collection(db, "studentInform"), where("ic", "==", scannedIC));
            const querySnapshot = await getDocs(q);

            if (querySnapshot.empty) {
                throw new Error("Pelajar tidak berdaftar.");
            }

            const studentData = querySnapshot.docs[0].data();
            const fullTimeStr = now.toLocaleString('ms-MY');

            await addDoc(collection(db, "attendanceLogs"), {
                studentId: studentData.studentId,
                name: studentData.name,
                className: studentData.className,
                ic: studentData.ic,
                timestamp: serverTimestamp(),
                date: todayStr,
                timeFull: fullTimeStr,
                status: attendanceStatus 
            });

            beepSound.play().catch(e => console.log("Audio play blocked"));

            const successMsg = attendanceStatus === "Lewat" ? "Kehadiran Berjaya (Lewat)" : "Kehadiran Berjaya!";
            showResult(studentData.name, successMsg, "success", fullTimeStr);
            
            setTimeout(resetResultPanel, 2000);

        } catch (error) {
            showResult("Gagal", error.message, "error");
            setTimeout(resetResultPanel, 2000);
        }
    }

    function resetResultPanel() {
        isProcessing = false;
        const icon = document.getElementById('status-icon');
        icon.className = 'status-icon';
        icon.innerHTML = '<i data-lucide="qr-code" style="color:#ccc"></i>';
        document.getElementById('res-name').innerText = "Menunggu imbasan...";
        document.getElementById('res-name').style.color = "#888";
        document.getElementById('res-msg').innerText = "";
        document.getElementById('res-time').innerText = "";
        lucide.createIcons();
    }

    function validateTime(qrTimeStr, limitSeconds) {
        if (qrTimeStr.length !== 14) return false;
        const year = parseInt(qrTimeStr.substring(0, 4));
        const month = parseInt(qrTimeStr.substring(4, 6)) - 1;
        const day = parseInt(qrTimeStr.substring(6, 8));
        const hour = parseInt(qrTimeStr.substring(8, 10));
        const min = parseInt(qrTimeStr.substring(10, 12));
        const sec = parseInt(qrTimeStr.substring(12, 14));

        const qrDate = new Date(year, month, day, hour, min, sec);
        const nowDate = new Date();
        const diff = Math.abs(nowDate.getTime() - qrDate.getTime());
        return diff <= (limitSeconds * 1000);
    }

    function showResult(name, msg, type, time = "") {
        const icon = document.getElementById('status-icon');
        const nameEl = document.getElementById('res-name');
        nameEl.innerText = name;
        nameEl.style.color = "#333";
        document.getElementById('res-msg').innerText = msg;
        document.getElementById('res-time').innerText = time;

        if (type === 'success') {
            icon.className = 'status-icon success';
            icon.innerHTML = '<i data-lucide="check-circle"></i>';
        } else if (type === 'error') {
            icon.className = 'status-icon error';
            icon.innerHTML = '<i data-lucide="alert-circle"></i>';
        } else {
            icon.className = 'status-icon';
            icon.innerHTML = '...';
        }
        lucide.createIcons();
    }
</script>
</body>
</html>
