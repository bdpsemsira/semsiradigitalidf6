<!DOCTYPE html>
<html lang="ms">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Semsira Scanner</title>
    <script src="https://unpkg.com/html5-qrcode"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        :root {
            --primary: #007AFF;
            --success: #34C759;
            --error: #FF3B30;
            --bg: #F2F2F7;
        }

        body {
            font-family: -apple-system, sans-serif;
            background-color: var(--bg);
            margin: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
        }

        .header {
            width: 100%;
            padding: 20px;
            text-align: center;
            background: white;
            box-shadow: 0 2px 5px rgba(0,0,0,0.1);
        }

        .camera-controls {
            width: 90%;
            max-width: 500px;
            margin-top: 15px;
            display: flex;
            flex-direction: column;
            gap: 10px;
        }

        select {
            padding: 12px;
            border-radius: 10px;
            border: 1px solid #CCC;
            font-size: 14px;
            background: white;
        }

        #reader {
            width: 90%;
            max-width: 500px;
            margin: 20px auto;
            border-radius: 15px;
            overflow: hidden;
            border: none !important;
            box-shadow: 0 4px 10px rgba(0,0,0,0.1);
        }

        .result-card {
            width: 85%;
            max-width: 400px;
            background: white;
            padding: 20px;
            border-radius: 15px;
            margin-top: 20px;
            display: none;
            box-shadow: 0 4px 15px rgba(0,0,0,0.1);
            text-align: center;
        }

        .status-icon {
            width: 60px;
            height: 60px;
            margin: 0 auto 10px;
            display: flex;
            align-items: center;
            justify-content: center;
            border-radius: 50%;
        }

        .success { color: var(--success); border: 2px solid var(--success); }
        .error { color: var(--error); border: 2px solid var(--error); }
    </style>
</head>
<body>

<div class="header">
    <h2 style="margin:0">Semsira Attendance</h2>
    <p style="font-size:14px; color:#888">Sila pilih kamera dan imbas Kod QR</p>
</div>

<div class="camera-controls">
    <select id="camera-select">
        <option value="">Mengesan Kamera...</option>
    </select>
</div>

<div id="reader"></div>

<div id="result-card" class="result-card">
    <div id="status-icon" class="status-icon"></div>
    <h3 id="res-name" style="margin:5px 0"></h3>
    <p id="res-msg" style="margin:5px 0; font-size:14px; color:#666"></p>
    <p id="res-time" style="font-size:12px; color:#999"></p>
</div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
    import { getFirestore, collection, query, where, getDocs, addDoc, serverTimestamp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

    const firebaseConfig = {
        apiKey: "AIzaSyCqY9ADs8oy1Uvh3-7eVCQLYfyTijm8lo4",
        authDomain: "bdpsemsira-5c274.firebaseapp.com",
        projectId: "bdpsemsira-5c274",
        storageBucket: "bdpsemsira-5c274.firebasestorage.app",
        messagingSenderId: "176946808975",
        appId: "1:176946808975:web:ef7447a11bb57fe71b88fa"
    };

    const app = initializeApp(firebaseConfig);
    const db = getFirestore(app);

    const html5QrCode = new Html5Qrcode("reader");
    const cameraSelect = document.getElementById('camera-select');
    let isProcessing = false;
    let currentCameraId = null;

    // --- 初始化相机选择 ---
    Html5Qrcode.getCameras().then(cameras => {
        if (cameras && cameras.length > 0) {
            cameraSelect.innerHTML = cameras.map(cam => `<option value="${cam.id}">${cam.label}</option>`).join('');
            startScanning(cameras[0].id);
        } else {
            cameraSelect.innerHTML = '<option value="">Tiada Kamera Dikesan</option>';
        }
    }).catch(err => {
        console.error("Gagal dpt kamera", err);
    });

    cameraSelect.addEventListener('change', (e) => {
        if (e.target.value) {
            html5QrCode.stop().then(() => startScanning(e.target.value));
        }
    });

    function startScanning(cameraId) {
        currentCameraId = cameraId;
        html5QrCode.start(
            cameraId, 
            { fps: 10, qrbox: { width: 250, height: 250 } }, 
            onScanSuccess
        );
    }

    async function onScanSuccess(decodedText) {
        if (isProcessing) return;
        isProcessing = true;

        showResult("Processing...", "Mengesahkan QR...", "wait");

        try {
            // 1. 解析数据 (IC|YYYYMMDDHHMMSS)
            const parts = decodedText.split('|');
            if (parts.length < 2) throw new Error("Format Kod QR Tidak Sah");

            const scannedIC = parts[0];
            const qrTimeStr = parts[1]; // 格式: 20260329200000

            // 2. 验证时间误差 (5秒限制)
            if (!validateTime(qrTimeStr, 5)) {
                throw new Error("Kod Tamat Tempoh (Melebihi 5s). Sila guna kod baru.");
            }

            // 3. 查询数据库
            const q = query(collection(db, "studentInform"), where("ic", "==", scannedIC));
            const querySnapshot = await getDocs(q);

            if (querySnapshot.empty) {
                throw new Error("Pelajar tidak berdaftar.");
            }

            const studentData = querySnapshot.docs[0].data();
            const now = new Date();
            const fullTimeStr = now.toLocaleString('ms-MY');

            // 4. 上传记录
            await addDoc(collection(db, "attendanceLogs"), {
                studentId: studentData.studentId,
                name: studentData.name,
                className: studentData.className,
                ic: studentData.ic,
                timestamp: serverTimestamp(),
                date: now.toISOString().split('T')[0],
                timeFull: fullTimeStr,
                status: "Hadir"
            });

            showResult(studentData.name, "Kehadiran Berjaya!", "success", fullTimeStr);
            
            setTimeout(() => {
                isProcessing = false;
                document.getElementById('result-card').style.display = 'none';
            }, 4000);

        } catch (error) {
            showResult("Gagal", error.message, "error");
            setTimeout(() => { isProcessing = false; }, 3000);
        }
    }

    // --- 时间验证逻辑 ---
    function validateTime(qrTimeStr, limitSeconds) {
        if (qrTimeStr.length !== 14) return false;

        // 解析格式 2026 03 29 20 00 00
        const year = parseInt(qrTimeStr.substring(0, 4));
        const month = parseInt(qrTimeStr.substring(4, 6)) - 1; // JS月份从0开始
        const day = parseInt(qrTimeStr.substring(6, 8));
        const hour = parseInt(qrTimeStr.substring(8, 10));
        const min = parseInt(qrTimeStr.substring(10, 12));
        const sec = parseInt(qrTimeStr.substring(12, 14));

        const qrDate = new Date(year, month, day, hour, min, sec);
        const nowDate = new Date();

        // 计算差值的绝对值 (单位: 毫秒)
        const diff = Math.abs(nowDate.getTime() - qrDate.getTime());
        return diff <= (limitSeconds * 1000);
    }

    function showResult(name, msg, type, time = "") {
        const card = document.getElementById('result-card');
        const icon = document.getElementById('status-icon');
        document.getElementById('res-name').innerText = name;
        document.getElementById('res-msg').innerText = msg;
        document.getElementById('res-time').innerText = time;

        card.style.display = 'block';
        if (type === 'success') {
            icon.className = 'status-icon success';
            icon.innerHTML = '<i data-lucide="check-circle"></i>';
        } else if (type === 'error') {
            icon.className = 'status-icon error';
            icon.innerHTML = '<i data-lucide="alert-circle"></i>';
        } else {
            icon.className = 'status-icon';
            icon.innerHTML = '...';
        }
        lucide.createIcons();
    }
</script>
</body>
</html>
