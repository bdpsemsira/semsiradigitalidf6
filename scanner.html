<!DOCTYPE html>
<html lang="ms">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Semsira Scanner</title>
    <script src="https://unpkg.com/html5-qrcode"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        :root {
            --primary: #007AFF;
            --success: #34C759;
            --warning: #FF9500;
            --error: #FF3B30;
            --bg: #F2F2F7;
        }

        body {
            font-family: -apple-system, sans-serif;
            background-color: var(--bg);
            margin: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            height: 100vh;
            width: 100vw;
            overflow: hidden; /* 防止滚动，确保全屏装下 */
        }

        .header {
            width: 100%;
            padding: 15px 0;
            text-align: center;
            background: white;
            box-shadow: 0 2px 5px rgba(0,0,0,0.1);
            flex-shrink: 0;
        }

        .camera-controls {
            width: 90%;
            max-width: 500px;
            margin-top: 10px;
            flex-shrink: 0;
        }

        select {
            width: 100%;
            padding: 10px;
            border-radius: 10px;
            border: 1px solid #CCC;
            font-size: 14px;
            background: white;
        }

        #reader {
            width: 90%;
            max-width: 450px;
            flex-grow: 1; /* 自动撑开填充剩余空间 */
            margin: 15px 0;
            border-radius: 15px;
            overflow: hidden;
            border: none !important;
            box-shadow: 0 4px 10px rgba(0,0,0,0.1);
            background: #000;
        }

        .result-card {
            width: 85%;
            max-width: 400px;
            background: white;
            padding: 15px;
            border-radius: 15px;
            position: fixed;
            bottom: 20px;
            z-index: 100;
            display: none;
            box-shadow: 0 4px 20px rgba(0,0,0,0.2);
            text-align: center;
            animation: slideUp 0.3s ease-out;
        }

        @keyframes slideUp {
            from { transform: translateY(100%); opacity: 0; }
            to { transform: translateY(0); opacity: 1; }
        }

        .status-icon {
            width: 50px;
            height: 50px;
            margin: 0 auto 10px;
            display: flex;
            align-items: center;
            justify-content: center;
            border-radius: 50%;
        }

        .success { color: var(--success); border: 2px solid var(--success); }
        .warning { color: var(--warning); border: 2px solid var(--warning); }
        .error { color: var(--error); border: 2px solid var(--error); }
    </style>
</head>
<body>

<div class="header">
    <h2 style="margin:0; font-size: 20px;">Semsira Attendance</h2>
    <p style="font-size:12px; color:#888; margin: 2px 0 0;">Imbas Kod QR untuk pendaftaran masuk</p>
</div>

<div class="camera-controls">
    <select id="camera-select">
        <option value="">Mengesan Kamera...</option>
    </select>
</div>

<div id="reader"></div>

<div id="result-card" class="result-card">
    <div id="status-icon" class="status-icon"></div>
    <h3 id="res-name" style="margin:5px 0; font-size: 18px;"></h3>
    <p id="res-msg" style="margin:5px 0; font-size:14px; font-weight: bold;"></p>
    <p id="res-time" style="font-size:12px; color:#999"></p>
</div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
    import { getFirestore, collection, query, where, getDocs, addDoc, serverTimestamp, doc, getDoc } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

    const firebaseConfig = {
        apiKey: "AIzaSyCqY9ADs8oy1Uvh3-7eVCQLYfyTijm8lo4",
        authDomain: "bdpsemsira-5c274.firebaseapp.com",
        projectId: "bdpsemsira-5c274",
        storageBucket: "bdpsemsira-5c274.firebasestorage.app",
        messagingSenderId: "176946808975",
        appId: "1:176946808975:web:ef7447a11bb57fe71b88fa"
    };

    const app = initializeApp(firebaseConfig);
    const db = getFirestore(app);

    const html5QrCode = new Html5Qrcode("reader");
    const cameraSelect = document.getElementById('camera-select');
    let isProcessing = false;
    let attendanceSettings = { lateTime: "07:30", absentTime: "08:30" };

    // 初始化：获取相机并下载全局时间配置
    async function init() {
        try {
            const settingsSnap = await getDoc(doc(db, "systemSettings", "attendance_time"));
            if (settingsSnap.exists()) {
                attendanceSettings = settingsSnap.data();
            }

            const cameras = await Html5Qrcode.getCameras();
            if (cameras && cameras.length > 0) {
                cameraSelect.innerHTML = cameras.map(cam => `<option value="${cam.id}">${cam.label}</option>`).join('');
                startScanning(cameras[0].id);
            } else {
                cameraSelect.innerHTML = '<option value="">Tiada Kamera Dikesan</option>';
            }
        } catch (err) {
            console.error("Init Error", err);
        }
    }

    init();

    cameraSelect.addEventListener('change', (e) => {
        if (e.target.value) {
            html5QrCode.stop().then(() => startScanning(e.target.value));
        }
    });

    function startScanning(cameraId) {
        html5QrCode.start(
            cameraId, 
            { fps: 15, qrbox: (viewWidth, viewHeight) => {
                const size = Math.min(viewWidth, viewHeight) * 0.7;
                return { width: size, height: size };
            }}, 
            onScanSuccess
        );
    }

    async function onScanSuccess(decodedText) {
        if (isProcessing) return;
        isProcessing = true;

        showResult("Processing...", "Mengesahkan...", "wait");

        try {
            const parts = decodedText.split('|');
            if (parts.length < 2) throw new Error("Format Kod QR Tidak Sah");

            const scannedIC = parts[0];
            const qrTimeStr = parts[1];

            // 10秒容错
            if (!validateTime(qrTimeStr, 10)) {
                throw new Error("Kod Tamat Tempoh. Sila guna kod baru.");
            }

            const now = new Date();
            const todayStr = now.toISOString().split('T')[0];

            // 判定状态逻辑 (根据 admin 设置的时间)
            const currentTimeStr = now.toTimeString().substring(0, 5); // "HH:MM"
            let finalStatus = "Hadir";
            let statusType = "success";

            if (currentTimeStr >= attendanceSettings.absentTime) {
                throw new Error(`Waktu pendaftaran telah tamat (${attendanceSettings.absentTime}). Anda dikira Tidak Hadir.`);
            } else if (currentTimeStr >= attendanceSettings.lateTime) {
                finalStatus = "Lewat";
                statusType = "warning";
            }

            // 检查重复签到
            const checkQuery = query(
                collection(db, "attendanceLogs"), 
                where("ic", "==", scannedIC),
                where("date", "==", todayStr)
            );
            const existingDocs = await getDocs(checkQuery);
            if (!existingDocs.empty) {
                throw new Error("Anda sudah mendaftar hari ini.");
            }

            // 获取学生信息
            const q = query(collection(db, "studentInform"), where("ic", "==", scannedIC));
            const querySnapshot = await getDocs(q);

            if (querySnapshot.empty) {
                throw new Error("Pelajar tidak berdaftar.");
            }

            const studentData = querySnapshot.docs[0].data();
            const fullTimeStr = now.toLocaleString('ms-MY');

            // 上传记录
            await addDoc(collection(db, "attendanceLogs"), {
                studentId: studentData.studentId,
                name: studentData.name,
                className: studentData.className,
                ic: studentData.ic,
                timestamp: serverTimestamp(),
                date: todayStr,
                timeFull: fullTimeStr,
                status: finalStatus
            });

            showResult(studentData.name, `Kehadiran: ${finalStatus}`, statusType, fullTimeStr);
            
            setTimeout(() => {
                isProcessing = false;
                document.getElementById('result-card').style.display = 'none';
            }, 5000);

        } catch (error) {
            showResult("Gagal", error.message, "error");
            setTimeout(() => { isProcessing = false; }, 3500);
        }
    }

    function validateTime(qrTimeStr, limitSeconds) {
        if (qrTimeStr.length !== 14) return false;
        const year = parseInt(qrTimeStr.substring(0, 4));
        const month = parseInt(qrTimeStr.substring(4, 6)) - 1;
        const day = parseInt(qrTimeStr.substring(6, 8));
        const hour = parseInt(qrTimeStr.substring(8, 10));
        const min = parseInt(qrTimeStr.substring(10, 12));
        const sec = parseInt(qrTimeStr.substring(12, 14));
        const qrDate = new Date(year, month, day, hour, min, sec);
        const nowDate = new Date();
        return Math.abs(nowDate.getTime() - qrDate.getTime()) <= (limitSeconds * 1000);
    }

    function showResult(name, msg, type, time = "") {
        const card = document.getElementById('result-card');
        const icon = document.getElementById('status-icon');
        document.getElementById('res-name').innerText = name;
        document.getElementById('res-msg').innerText = msg;
        document.getElementById('res-time').innerText = time;

        card.style.display = 'block';
        if (type === 'success') {
            icon.className = 'status-icon success';
            icon.innerHTML = '<i data-lucide="check-circle"></i>';
            document.getElementById('res-msg').style.color = "var(--success)";
        } else if (type === 'warning') {
            icon.className = 'status-icon warning';
            icon.innerHTML = '<i data-lucide="clock"></i>';
            document.getElementById('res-msg').style.color = "var(--warning)";
        } else if (type === 'error') {
            icon.className = 'status-icon error';
            icon.innerHTML = '<i data-lucide="alert-circle"></i>';
            document.getElementById('res-msg').style.color = "var(--error)";
        } else {
            icon.className = 'status-icon';
            icon.innerHTML = '...';
            document.getElementById('res-msg').style.color = "#333";
        }
        lucide.createIcons();
    }
</script>
</body>
</html>
