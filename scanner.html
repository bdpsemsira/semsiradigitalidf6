<!DOCTYPE html>
<html lang="ms">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Semsira Scanner</title>
    <script src="https://unpkg.com/html5-qrcode"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        :root {
            --primary: #007AFF;
            --success: #34C759;
            --error: #FF3B30;
            --bg: #F2F2F7;
        }

        body {
            font-family: -apple-system, sans-serif;
            background-color: var(--bg);
            margin: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
        }

        /* 启动遮罩层 */
        #start-overlay {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(255, 255, 255, 0.95);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            z-index: 1000;
            transition: opacity 0.5s ease;
        }

        .start-btn {
            background: var(--primary);
            color: white;
            border: none;
            padding: 18px 45px;
            border-radius: 35px;
            font-size: 20px;
            font-weight: bold;
            box-shadow: 0 6px 20px rgba(0,122,255,0.4);
            cursor: pointer;
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .header {
            width: 100%;
            padding: 10px 0;
            background: white;
            box-shadow: 0 2px 5px rgba(0,0,0,0.1);
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 12px;
        }

        .header img {
            width: 45px;
            height: 45px;
            border-radius: 8px;
        }

        .header-text h2 { margin: 0; font-size: 18px; }
        .header-text p { margin: 0; font-size: 12px; color: #888; }

        #reader {
            width: 90%;
            max-width: 500px;
            margin: 15px auto;
            border-radius: 15px;
            overflow: hidden;
            box-shadow: 0 4px 10px rgba(0,0,0,0.1);
        }

        .result-card {
            width: 85%;
            max-width: 400px;
            background: white;
            padding: 15px;
            border-radius: 15px;
            margin-top: 5px;
            min-height: 120px; 
            display: flex;
            flex-direction: column;
            justify-content: center;
            box-shadow: 0 4px 15px rgba(0,0,0,0.1);
            text-align: center;
        }

        .status-icon {
            width: 50px;
            height: 50px;
            margin: 0 auto 5px;
            display: flex;
            align-items: center;
            justify-content: center;
            border-radius: 50%;
        }

        .success { color: var(--success); border: 2px solid var(--success); }
        .error { color: var(--error); border: 2px solid var(--error); }
    </style>
</head>
<body>

<div id="start-overlay">
    <img src="/semsira.png" style="width: 120px; margin-bottom: 30px; border-radius: 25px;">
    <button class="start-btn" id="start-btn">
        <i data-lucide="bell-ring"></i> Aktifkan Suara & Kamera
    </button>
    <p style="margin-top:20px; color:#444; font-weight: 500;">Sila klik butang di atas</p>
</div>

<div class="header">
    <img src="/semsira.png" alt="Logo Semsira">
    <div class="header-text">
        <h2>Semsira Attendance</h2>
        <p>Sila imbas Kod QR Pelajar</p>
    </div>
</div>

<div class="camera-controls" style="width: 90%; max-width: 500px; margin-top: 10px;">
    <select id="camera-select" style="width:100%; padding:10px; border-radius:10px; border:1px solid #ccc;">
        <option value="">Mengesan Kamera...</option>
    </select>
</div>

<div id="reader"></div>

<div id="result-card" class="result-card">
    <div id="status-icon" class="status-icon">
        <i data-lucide="qr-code" style="color:#ccc"></i>
    </div>
    <h3 id="res-name" style="margin:5px 0; color:#888; font-size: 16px;">Menunggu imbasan...</h3>
    <p id="res-msg" style="margin:2px 0; font-size:14px; color:#666"></p>
    <p id="res-time" style="font-size:12px; color:#999"></p>
</div>

<audio id="beep-sound" src="beep.mp3" preload="auto"></audio>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
    import { getFirestore, collection, query, where, getDocs, addDoc, serverTimestamp, doc, getDoc } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

    const firebaseConfig = {
        apiKey: "AIzaSyCqY9ADs8oy1Uvh3-7eVCQLYfyTijm8lo4",
        authDomain: "bdpsemsira-5c274.firebaseapp.com",
        projectId: "bdpsemsira-5c274",
        storageBucket: "bdpsemsira-5c274.firebasestorage.app",
        messagingSenderId: "176946808975",
        appId: "1:176946808975:web:ef7447a11bb57fe71b88fa"
    };

    const app = initializeApp(firebaseConfig);
    const db = getFirestore(app);

    const html5QrCode = new Html5Qrcode("reader");
    const cameraSelect = document.getElementById('camera-select');
    const beepSound = document.getElementById('beep-sound');
    const startBtn = document.getElementById('start-btn');
    const startOverlay = document.getElementById('start-overlay');
    
    let isProcessing = false;

    lucide.createIcons();

    startBtn.addEventListener('click', function() {
        beepSound.play().then(() => {
            beepSound.pause();
            beepSound.currentTime = 0;
            console.log("Audio Unlocked Successfully");
        }).catch(err => console.log("Audio fail:", err));

        beepSound.load();

        startOverlay.style.opacity = '0';
        setTimeout(() => startOverlay.style.display = 'none', 500);

        initCamera();
    }, { once: true });

    function initCamera() {
        Html5Qrcode.getCameras().then(cameras => {
            if (cameras && cameras.length > 0) {
                cameraSelect.innerHTML = cameras.map(cam => `<option value="${cam.id}">${cam.label}</option>`).join('');
                startScanning(cameras[0].id);
            } else {
                cameraSelect.innerHTML = '<option value="">Tiada Kamera Dikesan</option>';
            }
        }).catch(err => console.error("Camera fail", err));
    }

    function startScanning(cameraId) {
        html5QrCode.start(cameraId, { fps: 10, qrbox: 250 }, onScanSuccess);
    }

    async function onScanSuccess(decodedText) {
        if (isProcessing) return;
        isProcessing = true;

        playBeep();
        showResult("Processing...", "Mengesahkan QR...", "wait");

        try {
            const parts = decodedText.split('|');
            if (parts.length < 2) throw new Error("Format Kod QR Tidak Sah");

            const scannedIC = parts[0];
            const qrTimeStr = parts[1];

            if (!validateTime(qrTimeStr, 10)) {
                throw new Error("Kod Tamat Tempoh. Sila guna kod baru.");
            }

            const timeSettingsSnap = await getDoc(doc(db, "systemSettings", "attendance_time"));
            let lateThreshold = "07:30"; 
            let absentThreshold = "08:30"; 

            if (timeSettingsSnap.exists()) {
                lateThreshold = timeSettingsSnap.data().lateTime;
                absentThreshold = timeSettingsSnap.data().absentTime;
            }

            const now = new Date();
            const currentTimeStr = `${String(now.getHours()).padStart(2, '0')}:${String(now.getMinutes()).padStart(2, '0')}`;

            if (currentTimeStr > absentThreshold) throw new Error(`Masa tamat (${absentThreshold}). Anda dikira Tidak Hadir.`);

            let attendanceStatus = "Hadir";
            if (currentTimeStr > lateThreshold) attendanceStatus = "Lewat";

            // --- 关键修复：使用本地日期格式 YYYY-MM-DD ---
            const todayStr = now.toLocaleDateString('en-CA'); 

            const checkQuery = query(collection(db, "attendanceLogs"), where("ic", "==", scannedIC), where("date", "==", todayStr));
            
            const existingDocs = await getDocs(checkQuery);
            if (!existingDocs.empty) throw new Error("Anda sudah mendaftar hari ini.");

            const q = query(collection(db, "studentInform"), where("ic", "==", scannedIC));
            const querySnapshot = await getDocs(q);
            if (querySnapshot.empty) throw new Error("Pelajar tidak berdaftar.");

            const studentData = querySnapshot.docs[0].data();
            const fullTimeStr = now.toLocaleString('ms-MY');

            await addDoc(collection(db, "attendanceLogs"), {
                studentId: studentData.studentId,
                name: studentData.name,
                className: studentData.className,
                ic: studentData.ic,
                timestamp: serverTimestamp(),
                date: todayStr, // 这里的日期现在会与 timeFull 一致了
                timeFull: fullTimeStr,
                status: attendanceStatus 
            });

            const successMsg = attendanceStatus === "Lewat" ? "Kehadiran Berjaya (Lewat)" : "Kehadiran Berjaya!";
            showResult(studentData.name, successMsg, "success", fullTimeStr);
            setTimeout(resetResultPanel, 2000);

        } catch (error) {
            showResult("Gagal", error.message, "error");
            setTimeout(resetResultPanel, 2000);
        }
    }

    function playBeep() {
        if (beepSound) {
            beepSound.pause();
            beepSound.currentTime = 0;
            const playPromise = beepSound.play();
            if (playPromise !== undefined) {
                playPromise.catch(e => console.error("Audio error:", e));
            }
        }
    }

    function resetResultPanel() {
        isProcessing = false;
        const icon = document.getElementById('status-icon');
        icon.className = 'status-icon';
        icon.innerHTML = '<i data-lucide="qr-code" style="color:#ccc"></i>';
        document.getElementById('res-name').innerText = "Menunggu imbasan...";
        document.getElementById('res-name').style.color = "#888";
        document.getElementById('res-msg').innerText = "";
        document.getElementById('res-time').innerText = "";
        lucide.createIcons();
    }

    function validateTime(qrTimeStr, limitSeconds) {
        if (qrTimeStr.length !== 14) return false;
        const year = parseInt(qrTimeStr.substring(0, 4));
        const month = parseInt(qrTimeStr.substring(4, 6)) - 1;
        const day = parseInt(qrTimeStr.substring(6, 8));
        const hour = parseInt(qrTimeStr.substring(8, 10));
        const min = parseInt(qrTimeStr.substring(10, 12));
        const sec = parseInt(qrTimeStr.substring(12, 14));
        const qrDate = new Date(year, month, day, hour, min, sec);
        const nowDate = new Date();
        return Math.abs(nowDate.getTime() - qrDate.getTime()) <= (limitSeconds * 1000);
    }

    function showResult(name, msg, type, time = "") {
        const icon = document.getElementById('status-icon');
        const nameEl = document.getElementById('res-name');
        nameEl.innerText = name;
        nameEl.style.color = "#333";
        document.getElementById('res-msg').innerText = msg;
        document.getElementById('res-time').innerText = time;
        if (type === 'success') {
            icon.className = 'status-icon success';
            icon.innerHTML = '<i data-lucide="check-circle"></i>';
        } else if (type === 'error') {
            icon.className = 'status-icon error';
            icon.innerHTML = '<i data-lucide="alert-circle"></i>';
        } else {
            icon.className = 'status-icon';
            icon.innerHTML = '...';
        }
        lucide.createIcons();
    }
</script>
</body>
</html>
