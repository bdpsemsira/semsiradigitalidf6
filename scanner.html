<!DOCTYPE html>
<html lang="ms">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Semsira Scanner - Focused</title>
    <script src="https://unpkg.com/html5-qrcode"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        :root {
            --primary: #007AFF;
            --success: #34C759;
            --error: #FF3B30;
            --bg: #F2F2F7;
        }

        body {
            font-family: -apple-system, sans-serif;
            background-color: var(--bg);
            margin: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
        }

        #start-overlay {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(255, 255, 255, 0.95);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            z-index: 1000;
            transition: opacity 0.5s ease;
        }

        .start-btn {
            background: var(--primary);
            color: white;
            border: none;
            padding: 18px 45px;
            border-radius: 35px;
            font-size: 20px;
            font-weight: bold;
            box-shadow: 0 6px 20px rgba(0,122,255,0.4);
            cursor: pointer;
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .header {
            width: 100%;
            padding: 10px 0;
            background: white;
            box-shadow: 0 2px 5px rgba(0,0,0,0.1);
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 12px;
        }

        .header img { width: 45px; height: 45px; border-radius: 8px; }
        .header-text h2 { margin: 0; font-size: 18px; }
        .header-text p { margin: 0; font-size: 12px; color: #888; }

        #reader {
            width: 90%;
            max-width: 500px;
            margin: 15px auto;
            border-radius: 15px;
            overflow: hidden;
            box-shadow: 0 4px 10px rgba(0,0,0,0.1);
            background: #000;
        }

        .result-card {
            width: 85%;
            max-width: 400px;
            background: white;
            padding: 15px;
            border-radius: 15px;
            margin-top: 5px;
            min-height: 120px; 
            display: flex;
            flex-direction: column;
            justify-content: center;
            box-shadow: 0 4px 15px rgba(0,0,0,0.1);
            text-align: center;
        }

        .status-icon {
            width: 50px;
            height: 50px;
            margin: 0 auto 5px;
            display: flex;
            align-items: center;
            justify-content: center;
            border-radius: 50%;
        }

        .success { color: var(--success); border: 2px solid var(--success); }
        .error { color: var(--error); border: 2px solid var(--error); }
    </style>
</head>
<body>

<div id="start-overlay">
    <img src="/semsira.png" style="width: 120px; margin-bottom: 30px; border-radius: 25px;">
    <button class="start-btn" id="start-btn">
        <i data-lucide="bell-ring"></i> Aktifkan Scanner
    </button>
</div>

<div class="header">
    <img src="/semsira.png" alt="Logo Semsira">
    <div class="header-text">
        <h2>Semsira Attendance</h2>
        <p>Sila imbas Kod QR Pelajar</p>
    </div>
</div>

<div class="camera-controls" style="width: 90%; max-width: 500px; margin-top: 10px;">
    <select id="camera-select" style="width:100%; padding:12px; border-radius:10px; border:1px solid #ccc; font-size: 14px; background: white;">
        <option value="">Mengesan Kamera...</option>
    </select>
</div>

<div id="reader"></div>

<div id="result-card" class="result-card">
    <div id="status-icon" class="status-icon">
        <i data-lucide="qr-code" style="color:#ccc"></i>
    </div>
    <h3 id="res-name" style="margin:5px 0; color:#888; font-size: 16px;">Menunggu imbasan...</h3>
    <p id="res-msg" style="margin:2px 0; font-size:14px; color:#666"></p>
    <p id="res-time" style="font-size:12px; color:#999"></p>
</div>

<audio id="beep-sound" src="beep.mp3" preload="auto"></audio>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
    import { getFirestore, collection, query, where, getDocs, addDoc, serverTimestamp, doc, getDoc } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

    const firebaseConfig = {
        apiKey: "AIzaSyCqY9ADs8oy1Uvh3-7eVCQLYfyTijm8lo4",
        authDomain: "bdpsemsira-5c274.firebaseapp.com",
        projectId: "bdpsemsira-5c274",
        storageBucket: "bdpsemsira-5c274.firebasestorage.app",
        messagingSenderId: "176946808975",
        appId: "1:176946808975:web:ef7447a11bb57fe71b88fa"
    };

    const app = initializeApp(firebaseConfig);
    const db = getFirestore(app);

    const html5QrCode = new Html5Qrcode("reader");
    const cameraSelect = document.getElementById('camera-select');
    const beepSound = document.getElementById('beep-sound');
    const startBtn = document.getElementById('start-btn');
    const startOverlay = document.getElementById('start-overlay');
    
    let isProcessing = false;

    lucide.createIcons();

    startBtn.addEventListener('click', function() {
        beepSound.play().catch(e => {}); 
        startOverlay.style.opacity = '0';
        setTimeout(() => startOverlay.style.display = 'none', 500);
        initCamera();
    }, { once: true });

    function initCamera() {
        Html5Qrcode.getCameras().then(cameras => {
            if (cameras && cameras.length > 0) {
                cameraSelect.innerHTML = cameras.map(cam => `<option value="${cam.id}">${cam.label}</option>`).join('');
                
                cameraSelect.addEventListener('change', (e) => {
                    const newId = e.target.value;
                    if (newId) {
                        html5QrCode.stop().then(() => startScanning(newId));
                    }
                });

                startScanning(cameras[0].id);
            } else {
                cameraSelect.innerHTML = '<option value="">Tiada Kamera</option>';
            }
        }).catch(err => console.error(err));
    }

    function startScanning(cameraId) {
        // --- 核心优化：针对外接 WebCam 的 Constraints ---
        const config = {
            fps: 20, // 提高帧率，更快捕捉清晰瞬间
            qrbox: { width: 280, height: 280 },
            aspectRatio: 1.0,
            videoConstraints: {
                deviceId: cameraId,
                // 强制要求自动对焦（如果硬件支持）
                focusMode: "continuous",
                // 尝试提升曝光，Windows 外接头通常偏暗
                advanced: [
                    { focusMode: "continuous" },
                    { exposureMode: "continuous" }
                ]
            }
        };

        html5QrCode.start(cameraId, config, onScanSuccess)
        .then(() => {
            applyAdvancedSettings(); // 启动后尝试二次锁定硬件参数
        })
        .catch(err => console.error(err));
    }

    async function applyAdvancedSettings() {
        try {
            const track = html5QrCode.getRunningTrack();
            const capabilities = track.getCapabilities();
            const constraints = { advanced: [] };

            // 1. 如果支持连续对焦
            if (capabilities.focusMode && capabilities.focusMode.includes('continuous')) {
                constraints.advanced.push({ focusMode: 'continuous' });
            }
            
            // 2. 适当增加亮度，外接摄像头识别二维码时，亮一点更好扫
            if (capabilities.brightness) {
                constraints.advanced.push({ brightness: capabilities.brightness.max * 0.6 });
            }

            if (constraints.advanced.length > 0) {
                await track.applyConstraints(constraints);
            }
        } catch (e) {
            console.warn("Hardware focus control not supported on this webcam driver.");
        }
    }

    async function onScanSuccess(decodedText) {
        if (isProcessing) return;
        isProcessing = true;
        playBeep();
        showResult("Sila Tunggu", "Memproses data...", "wait");

        try {
            const parts = decodedText.split('|');
            if (parts.length < 2) throw new Error("Format QR Tidak Sah");

            const scannedIC = parts[0];
            const qrTimeStr = parts[1];
            if (!validateTime(qrTimeStr, 15)) throw new Error("QR Expired. Sila scan baru.");

            const timeSettingsSnap = await getDoc(doc(db, "systemSettings", "attendance_time"));
            let lateThreshold = "07:30"; 
            let absentThreshold = "08:30"; 
            if (timeSettingsSnap.exists()) {
                lateThreshold = timeSettingsSnap.data().lateTime;
                absentThreshold = timeSettingsSnap.data().absentTime;
            }

            const now = new Date();
            const currentTimeStr = `${String(now.getHours()).padStart(2, '0')}:${String(now.getMinutes()).padStart(2, '0')}`;
            if (currentTimeStr > absentThreshold) throw new Error(`Masa tamat (${absentThreshold}).`);

            let status = currentTimeStr > lateThreshold ? "Lewat" : "Hadir";
            const todayStr = now.toLocaleDateString('en-CA'); 

            const checkQuery = query(collection(db, "attendanceLogs"), where("ic", "==", scannedIC), where("date", "==", todayStr));
            const existingDocs = await getDocs(checkQuery);
            if (!existingDocs.empty) throw new Error("Dah scan hari ini.");

            const q = query(collection(db, "studentInform"), where("ic", "==", scannedIC));
            const snap = await getDocs(q);
            if (snap.empty) throw new Error("Pelajar tidak dijumpai.");

            const student = snap.docs[0].data();
            const fullTime = now.toLocaleString('ms-MY');

            await addDoc(collection(db, "attendanceLogs"), {
                studentId: student.studentId,
                name: student.name,
                className: student.className,
                ic: student.ic,
                timestamp: serverTimestamp(),
                date: todayStr,
                timeFull: fullTime,
                status: status
            });

            showResult(student.name, status === "Lewat" ? "Berjaya (Lewat)" : "Berjaya Hadir!", "success", fullTime);
            setTimeout(resetResultPanel, 2500);

        } catch (error) {
            showResult("Gagal", error.message, "error");
            setTimeout(resetResultPanel, 2500);
        }
    }

    function playBeep() {
        beepSound.currentTime = 0;
        beepSound.play().catch(e => {});
    }

    function resetResultPanel() {
        isProcessing = false;
        const icon = document.getElementById('status-icon');
        icon.className = 'status-icon';
        icon.innerHTML = '<i data-lucide="qr-code" style="color:#ccc"></i>';
        document.getElementById('res-name').innerText = "Menunggu imbasan...";
        document.getElementById('res-name').style.color = "#888";
        document.getElementById('res-msg').innerText = "";
        document.getElementById('res-time').innerText = "";
        lucide.createIcons();
    }

    function validateTime(qrTimeStr, limitSec) {
        if (qrTimeStr.length !== 14) return false;
        const qrDate = new Date(
            qrTimeStr.substring(0, 4),
            parseInt(qrTimeStr.substring(4, 6)) - 1,
            qrTimeStr.substring(6, 8),
            qrTimeStr.substring(8, 10),
            qrTimeStr.substring(10, 12),
            qrTimeStr.substring(12, 14)
        );
        return Math.abs(new Date().getTime() - qrDate.getTime()) <= (limitSec * 1000);
    }

    function showResult(name, msg, type, time = "") {
        const icon = document.getElementById('status-icon');
        document.getElementById('res-name').innerText = name;
        document.getElementById('res-name').style.color = "#333";
        document.getElementById('res-msg').innerText = msg;
        document.getElementById('res-time').innerText = time;
        if (type === 'success') {
            icon.className = 'status-icon success';
            icon.innerHTML = '<i data-lucide="check-circle"></i>';
        } else if (type === 'error') {
            icon.className = 'status-icon error';
            icon.innerHTML = '<i data-lucide="alert-circle"></i>';
        } else {
            icon.className = 'status-icon';
            icon.innerHTML = '...';
        }
        lucide.createIcons();
    }
</script>
</body>
</html>
