<!DOCTYPE html>
<html lang="ms">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>SEMSIRA - Pasang App</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }

        .card {
            background: white;
            border-radius: 48px;
            max-width: 380px;
            width: 100%;
            padding: 48px 32px;
            text-align: center;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.3);
        }

        .logo {
            width: 100px;
            height: 100px;
            margin: 0 auto 24px;
            background: #f0f0f0;
            border-radius: 24px;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
        }

        .logo img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        h1 {
            font-size: 28px;
            font-weight: 800;
            color: #1e293b;
            margin-bottom: 8px;
        }

        .subtitle {
            color: #64748b;
            font-size: 14px;
            margin-bottom: 32px;
        }

        .install-btn {
            background: #007AFF;
            color: white;
            border: none;
            width: 100%;
            padding: 18px 24px;
            font-size: 18px;
            font-weight: 700;
            border-radius: 60px;
            cursor: pointer;
            transition: all 0.2s ease;
            box-shadow: 0 8px 20px rgba(0, 122, 255, 0.4);
        }

        .install-btn:active {
            transform: scale(0.97);
        }

        .install-btn:disabled {
            opacity: 0.6;
            transform: none;
        }
    </style>
</head>
<body>

<div class="card">
    <div class="logo">
        <img src="/semsira.png" alt="SEMSIRA" onerror="this.src='https://bdpsemsira.github.io/semsira.png'">
    </div>
    <h1>SEMSIRA Digital ID</h1>
    <div class="subtitle">Klik untuk pasang aplikasi</div>
    <button class="install-btn" id="installBtn">📲 Pasang Aplikasi</button>
</div>

<script>
    let deferredPrompt = null;
    let isInstalling = false;

    // 监听安装事件
    window.addEventListener('beforeinstallprompt', (e) => {
        e.preventDefault();
        deferredPrompt = e;
    });

    // 监听安装完成
    window.addEventListener('appinstalled', () => {
        // 安装成功后，跳转到应用
        window.location.href = 'https://bdpsemsira.github.io/semsiradigitalidf6';
    });

    // 安装按钮点击 - 无任何弹窗提示
    document.getElementById('installBtn').addEventListener('click', async () => {
        if (isInstalling) return;
        
        if (deferredPrompt) {
            isInstalling = true;
            const btn = document.getElementById('installBtn');
            btn.disabled = true;
            btn.innerText = '⏳ Memasang...';
            
            // 显示安装弹窗
            deferredPrompt.prompt();
            
            const { outcome } = await deferredPrompt.userChoice;
            
            if (outcome === 'accepted') {
                // 用户点击安装，等待 appinstalled 事件跳转
                btn.innerText = '✅ Berjaya!';
            } else {
                // 用户取消，恢复按钮
                btn.disabled = false;
                btn.innerText = '📲 Pasang Aplikasi';
                isInstalling = false;
            }
            
            deferredPrompt = null;
        } else {
            // 没有安装事件，静默失败 - 不显示任何提示
            // 直接跳转到 PWA 页面
            window.location.href = 'https://bdpsemsira.github.io/semsiradigitalidf6';
        }
    });
</script>
</body>
</html>
