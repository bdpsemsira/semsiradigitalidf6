<!DOCTYPE html>
<html lang="ms">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Panel Admin Semsira</title>
    <link rel="icon" type="image/png" href="/semsira.png">
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        :root { --primary: #007AFF; --bg: #F2F2F7; --success: #34C759; --danger: #FF3B30; --secondary: #8e8e93; }
        body { font-family: -apple-system, BlinkMacSystemFont, sans-serif; background: var(--bg); margin: 0; padding: 20px; user-select: none; }
        
        /* Login Overlay */
        #login-overlay { 
            position: fixed; top: 0; left: 0; width: 100%; height: 100%; 
            background: white; display: flex; flex-direction: column; 
            justify-content: center; align-items: center; z-index: 1000; 
        }
        #login-overlay img { width: 100px; height: 100px; margin-bottom: 20px; border-radius: 22px; box-shadow: 0 10px 20px rgba(0,0,0,0.1); }
        input { padding: 12px; margin: 8px; border: 1px solid #ddd; border-radius: 10px; width: 260px; font-size: 14px; outline: none; }
        input:focus { border-color: var(--primary); }
        button { padding: 12px 24px; background: var(--primary); color: white; border: none; border-radius: 10px; cursor: pointer; font-weight: 600; transition: 0.2s; display: flex; align-items: center; gap: 8px; justify-content: center; }
        button:active { transform: scale(0.98); opacity: 0.9; }

        /* Main Layout */
        #admin-content { display: none; max-width: 1000px; margin: 0 auto; padding-top: 80px; }
        
        .nav-container { 
            position: fixed; top: 0; left: 0; right: 0; 
            background: rgba(255, 255, 255, 0.8); backdrop-filter: blur(20px); 
            z-index: 999; padding: 10px 20px; border-bottom: 0.5px solid #d1d1d6;
        }
        .nav-content-wrapper { max-width: 1000px; margin: 0 auto; display: flex; justify-content: space-between; align-items: center; }
        .nav-title-box img { width: 28px; height: 28px; border-radius: 7px; }
        .nav-btns { display: flex; gap: 8px; overflow-x: auto; flex: 1; margin: 0 15px; }
        .nav-btns::-webkit-scrollbar { display: none; }
        .nav-btns button { padding: 8px 16px; font-size: 11px; flex-shrink: 0; }
        
        #live-clock { font-size: 12px; font-weight: 600; background: rgba(0,122,255,0.1); padding: 6px 12px; border-radius: 8px; white-space: nowrap; }

        .btn-logout { background: var(--danger) !important; }
        .btn-nav-alt { background: white; color: var(--primary); border: 1px solid var(--primary); }

        .card { background: white; padding: 24px; border-radius: 18px; box-shadow: 0 4px 20px rgba(0,0,0,0.05); margin-bottom: 24px; }
        .card h3 { margin-top: 0; display: flex; align-items: center; gap: 10px; font-size: 18px; }
        
        table { width: 100%; border-collapse: collapse; margin-top: 15px; }
        th, td { padding: 14px; text-align: left; border-bottom: 1px solid #f2f2f7; font-size: 13px; }
        th { background: #f9f9fb; color: #8e8e93; text-transform: uppercase; }
        
        .status-badge { padding: 4px 8px; border-radius: 6px; font-size: 10px; font-weight: bold; }
        .status-present { background: #E7F9ED; color: var(--success); }
        .status-absent { background: #FFEBEB; color: var(--danger); }

        .clickable { cursor: pointer; color: var(--primary); font-weight: 500; }
        .address-cell { max-width: 150px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; color: #666; }
    </style>
</head>
<body oncontextmenu="return false">

<div id="login-overlay">
    <img src="/semsira.png" alt="Logo">
    <h2 style="margin-bottom: 10px;">Admin Semsira</h2>
    <input type="text" id="admin-user" placeholder="ID Pengguna">
    <input type="password" id="admin-pass" placeholder="Kata Laluan">
    <div style="margin: 10px; font-size: 13px; color: #666; display: flex; align-items: center; gap: 5px;">
        <input type="checkbox" id="remember-me" style="width: auto; margin: 0;"> <label for="remember-me">Ingat saya</label>
    </div>
    <button onclick="checkLogin()" style="width: 285px;">Masuk Ke Panel</button>
</div>

<div id="admin-content">
    <div class="nav-container">
        <div class="nav-content-wrapper">
            <div class="nav-title-box"><img src="/semsira.png" alt="Logo"></div>
            <div class="nav-btns">
                <button onclick="location.href='dashboard.html'"><i data-lucide="layout-dashboard"></i> Dashboard</button>
                <button class="btn-nav-alt" onclick="scrollToSec('section-pelajar')"><i data-lucide="user-square"></i> Status Hadir</button>
                <button class="btn-nav-alt" onclick="scrollToSec('section-guru')"><i data-lucide="users"></i> Guru</button>
                <button class="btn-logout" onclick="logout()"><i data-lucide="log-out"></i> Keluar</button>
            </div>
            <div id="live-clock">...</div>
        </div>
    </div>

    <div class="card" id="section-pelajar">
        <h3><i data-lucide="list"></i> Status Kehadiran Pelajar (Hari Ini)</h3>
        <div style="display: flex; gap: 10px; margin-bottom: 15px;">
            <input type="text" id="search-box" placeholder="Cari nama atau IC..." oninput="filterStudents()" style="flex: 1; margin: 0;">
            <button id="btn-report" style="background: #0088cc; font-size: 12px;" onclick="triggerManualAlert()">
                <i data-lucide="send"></i> Hantar Telegram
            </button>
        </div>
        <table id="student-table">
            <thead>
                <tr><th>Nama</th><th>Kelas</th><th>Status</th><th>Aksi</th></tr>
            </thead>
            <tbody id="student-list">
                <tr><td colspan="4" style="text-align:center;">Memuatkan data...</td></tr>
            </tbody>
        </table>
    </div>

    <div class="card" id="section-guru">
        <h3><i data-lucide="users-2"></i> Telegram Guru</h3>
        <div id="teacher-table-container"></div>
        <button style="width:100%; margin-top:15px; background: var(--success);" onclick="saveTeacherIDs()">Simpan ID Guru</button>
    </div>
</div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
    import { getFirestore, collection, getDocs, doc, setDoc, getDoc, updateDoc, query, where } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

    const firebaseConfig = {
        apiKey: "AIzaSyCqY9ADs8oy1Uvh3-7eVCQLYfyTijm8lo4",
        authDomain: "bdpsemsira-5c274.firebaseapp.com",
        projectId: "bdpsemsira-5c274",
        storageBucket: "bdpsemsira-5c274.firebasestorage.app",
        messagingSenderId: "176946808975",
        appId: "1:176946808975:web:ef7447a11bb57fe71b88fa"
    };

    const app = initializeApp(firebaseConfig);
    const db = getFirestore(app);

    const BOT_TOKEN = "8639588054:AAG8gu9xWL2IoacH_N3mBS7U2dpqnXZtfNI"; 
    const ALL_CLASSES = ['Aishah', 'Fatimah', 'Khadijah', 'Ruqayyah', 'Sarah', 'Summayah', 'Ummukalthom', 'Zainab', 'Al Farabi', 'Al Ghazali', 'Al Khawarizmi','Al Khindi','Al Mawardi','Al Razi','Ibnu Khaldun','Ibnu Rusyd'];
    
    let allStudents = [];
    let presentICs = new Set();

    // 页面加载逻辑：处理自动登录
    window.onload = () => {
        if(localStorage.getItem("semsira_isLoggedIn") === "true") {
            showAdmin();
        }
    };

    window.checkLogin = () => {
        const u = document.getElementById('admin-user').value;
        const p = document.getElementById('admin-pass').value;
        const remember = document.getElementById('remember-me').checked;

        if(u === "semsiraadmin" && p === "pw123") {
            if(remember) localStorage.setItem("semsira_isLoggedIn", "true");
            showAdmin();
        } else { alert("ID atau Kata Laluan Salah!"); }
    };

    function showAdmin() {
        document.getElementById('login-overlay').style.display = 'none';
        document.getElementById('admin-content').style.display = 'block';
        loadAllData();
        lucide.createIcons();
        setInterval(updateClock, 1000);
    }

    async function loadAllData() {
        await loadAttendance(); // 先加载今日已到的人
        await loadStudents();   // 再加载学生名单
        await loadTeacherSettings();
    }

    // 获取今日已签到的人 (参考 Dashboard 逻辑)
    async function loadAttendance() {
        const todayStr = new Date().toISOString().split('T')[0];
        const q = query(collection(db, "attendanceLogs"), where("date", "==", todayStr));
        const snap = await getDocs(q);
        presentICs.clear();
        snap.forEach(d => {
            if(d.data().ic) presentICs.add(d.data().ic);
        });
    }

    async function loadStudents() {
        const snap = await getDocs(collection(db, "studentInform"));
        allStudents = [];
        snap.forEach(d => allStudents.push({ id: d.id, ...d.data() }));
        renderStudents(allStudents);
    }

    function renderStudents(list) {
        const tbody = document.getElementById('student-list');
        tbody.innerHTML = list.map(s => {
            const isHadir = presentICs.has(s.ic);
            return `
            <tr>
                <td>${s.name || '-'}</td>
                <td>${s.className || '-'}</td>
                <td>
                    <span class="status-badge ${isHadir ? 'status-present' : 'status-absent'}">
                        ${isHadir ? 'HADIR' : 'TIDAK HADIR'}
                    </span>
                </td>
                <td>
                    <button class="btn-nav-alt" style="padding:4px 8px; font-size:10px" onclick="resetDevice('${s.id}')">Reset</button>
                </td>
            </tr>`;
        }).join('');
    }

    // --- 其他功能函数 ---

    window.scrollToSec = (id) => document.getElementById(id).scrollIntoView({behavior:'smooth'});

    function updateClock() {
        const now = new Date();
        document.getElementById('live-clock').innerText = now.toLocaleTimeString('ms-MY');
    }

    window.logout = () => {
        localStorage.removeItem("semsira_isLoggedIn");
        location.reload();
    };

    window.filterStudents = () => {
        const v = document.getElementById('search-box').value.toLowerCase();
        renderStudents(allStudents.filter(s => (s.name||'').toLowerCase().includes(v) || (s.ic||'').includes(v)));
    };

    window.resetDevice = async (id) => {
        if(confirm("Reset Device ID?")) {
            await updateDoc(doc(db, "studentInform", id), { registeredDeviceId: "" });
            alert("Berjaya!");
        }
    };

    async function loadTeacherSettings() {
        const snap = await getDocs(collection(db, "classSettings"));
        let dataMap = {};
        snap.forEach(d => dataMap[d.id] = d.data().chatId);
        let html = `<table><tr><th>Kelas</th><th>Telegram ID</th></tr>`;
        ALL_CLASSES.forEach(cls => {
            html += `<tr><td>${cls}</td><td><input type="text" id="t-id-${cls}" value="${dataMap[cls] || ''}" style="width:90%;margin:0;"></td></tr>`;
        });
        document.getElementById('teacher-table-container').innerHTML = html + `</table>`;
    }

    window.saveTeacherIDs = async () => {
        for(let cls of ALL_CLASSES) {
            const val = document.getElementById(`t-id-${cls}`).value;
            if(val) await setDoc(doc(db, "classSettings", cls), { chatId: val.trim() });
        }
        alert("Berjaya Disimpan!");
    };

    window.triggerManualAlert = async () => {
        if(!confirm("Hantar senarai TIDAK HADIR ke Telegram Guru?")) return;
        const btn = document.getElementById('btn-report');
        btn.innerText = "Processing...";
        btn.disabled = true;

        const teacherSnap = await getDocs(collection(db, "classSettings"));
        let teacherMap = {};
        teacherSnap.forEach(snap => teacherMap[snap.id] = snap.data().chatId);

        for(let cls of ALL_CLASSES) {
            const chatId = teacherMap[cls];
            if(!chatId) continue;
            
            const absents = allStudents.filter(s => 
                (s.className||'').toLowerCase() === cls.toLowerCase() && !presentICs.has(s.ic)
            );

            if(absents.length > 0) {
                await sendTelegram(chatId, cls, absents);
            }
        }
        alert("Semua laporan telah dihantar!");
        btn.innerHTML = `<i data-lucide="send"></i> Hantar Telegram`;
        btn.disabled = false;
        lucide.createIcons();
    };

    async function sendTelegram(chatId, cls, list) {
        let text = `⚠️ *LAPORAN TIDAK HADIR*\n*Kelas:* ${cls}\n*Tarikh:* ${new Date().toLocaleDateString()}\n\n`;
        list.forEach((s, i) => text += `${i+1}. ${s.name}\n`);
        await fetch(`https://api.telegram.org/bot${BOT_TOKEN}/sendMessage`, {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ chat_id: chatId, text: text, parse_mode: 'Markdown' })
        });
    }
</script>
</body>
</html>
