<!DOCTYPE html>
<html lang="ms">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard Kehadiran Semsira</title>
    <link rel="icon" type="image/png" href="/semsira.png">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <script src="https://html2canvas.hertzen.com/dist/html2canvas.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <style>
        :root {
            --primary: #007AFF;
            --lewat: #FF9500;
            --bg: #F2F2F7;
            --card: #FFFFFF;
        }

        body {
            font-family: -apple-system, sans-serif;
            background-color: var(--bg);
            margin: 0;
            padding: 20px;
        }

        .screenshot-target {
            background: var(--bg);
            padding: 15px;
            border-radius: 15px;
        }

        .header-container {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 10px;
        }

        .header-logo {
            display: flex;
            align-items: center;
            gap: 15px;
        }

        .header-logo img {
            width: 50px;
            height: 50px;
            border-radius: 10px;
        }

        .date-time-info {
            background: white;
            padding: 10px 15px;
            border-radius: 10px;
            margin-bottom: 10px;
            display: flex;
            justify-content: space-between;
            font-weight: 600;
            color: #1c1c1e;
            box-shadow: 0 2px 5px rgba(0,0,0,0.05);
        }

        .button-group {
            display: flex;
            gap: 10px;
        }

        .btn-action {
            color: white;
            border: none;
            padding: 8px 15px;
            border-radius: 8px;
            cursor: pointer;
            display: flex;
            align-items: center;
            gap: 6px;
            font-weight: bold;
            font-size: 13px;
            transition: opacity 0.2s;
        }

        .btn-action:hover { opacity: 0.8; }
        .bg-primary { background: var(--primary); }
        .bg-purple { background: #5856D6; }
        .bg-green { background: #34C759; }

        .dashboard-container {
            background: var(--card);
            padding: 20px;
            border-radius: 15px;
            box-shadow: 0 4px 10px rgba(0,0,0,0.05);
            margin-bottom: 20px;
            position: relative;
        }

        .section-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 15px;
        }

        /* 修复：Input Panel 样式 */
        .manual-panel {
            display: none;
            background: #FFFFFF;
            padding: 20px;
            border-radius: 15px;
            margin-bottom: 20px;
            border: 2px solid var(--primary);
            box-shadow: 0 4px 15px rgba(0,122,255,0.1);
        }

        .input-row {
            display: flex;
            gap: 10px;
            margin-bottom: 10px;
            flex-wrap: wrap;
        }

        .input-row select, .input-row input {
            padding: 10px;
            border-radius: 8px;
            border: 1px solid #ccc;
            flex: 1;
            min-width: 150px;
        }

        .chart-wrapper {
            width: 100%;
            height: 400px;
        }

        table {
            width: 100%;
            border-collapse: collapse;
            margin-top: 10px;
            background: white;
        }

        th, td {
            border: 1px solid #ddd;
            padding: 12px;
            text-align: center;
        }

        th { 
            background-color: #D0E1F9 !important; 
            color: #000;
            font-weight: bold; 
        }
        .summary-row { background-color: #FFEB3B !important; font-weight: bold; }
        .total-label { background-color: #FF9800 !important; color: white !important; }
        .lewat-text { color: var(--lewat); font-weight: bold; }
        
        /* 截图控制类 */
        .hide-for-shot { display: none !important; }
        
        @media print {
            .no-print { display: none !important; }
        }
    </style>
</head>
<body>

<div id="fullReportWrapper" class="screenshot-target">
    <div class="header-container">
        <div class="header-logo">
            <img src="/semsira.png" alt="Logo Semsira">
            <div>
                <h2 style="margin:0;">Analisis Kehadiran Murid</h2>
                <small id="display-day" style="color:#666;">Hari: --</small>
            </div>
        </div>
        <div class="button-group no-print">
            <button class="btn-action bg-purple" onclick="toggleManualPanel()">
                <i data-lucide="edit-3"></i> Input
            </button>
            <button class="btn-action bg-primary" onclick="exportFullPDF()">
                <i data-lucide="printer"></i> Cetak
            </button>
        </div>
    </div>

    <div class="date-time-info">
        <span id="current-date">Tarikh: --/--/----</span>
        <span id="current-time">Masa: --:--:--</span>
    </div>

    <div id="manualPanel" class="manual-panel no-print">
        <h3 style="margin-top:0;">Input Data Manual</h3>
        <div id="manualInputs">
            <div class="input-row">
                <select class="m-class-select"></select>
                <input type="text" placeholder="Hadir K1/Total (e.g. 8/10)" class="m-k1" style="border-color: #34C759;">
                <input type="text" placeholder="Hadir K2/Total (e.g. 7/10)" class="m-k2" style="border-color: #007AFF;">
                <button class="btn-action" style="background:#FF3B30;" onclick="removeRow(this)">Padam</button>
            </div>
        </div>
        <div style="margin-top:15px; display:flex; gap:10px;">
            <button class="btn-action bg-green" onclick="addRow()">+ Tambah</button>
            <button class="btn-action bg-primary" onclick="applyManualData()">Jana Laporan</button>
            <button class="btn-action" style="background:#8E8E93;" onclick="resetToFirebase()">Reset</button>
        </div>
    </div>

    <div class="dashboard-container" id="graphSection">
        <div class="section-header no-print">
            <h4 style="margin:0;">Visualisasi Peratus (%)</h4>
            <button class="btn-action bg-green" onclick="captureSpecific('graph')">
                <i data-lucide="camera"></i> Screenshot Graph
            </button>
        </div>
        <div class="chart-wrapper">
            <canvas id="attendanceChart"></canvas>
        </div>
    </div>

    <div class="dashboard-container" id="reportSection">
        <div class="section-header no-print">
            <h4 style="margin:0;">Statistik Kelas</h4>
            <button class="btn-action bg-green" onclick="captureSpecific('result')">
                <i data-lucide="camera"></i> Screenshot Result
            </button>
        </div>
        <table id="attendanceTable">
            <thead>
                <tr>
                    <th>KELAS</th>
                    <th>BIL. MURID</th>
                    <th>K1 (HADIR)</th>
                    <th>K2 (HADIR)</th>
                    <th class="lewat-col">LEWAT</th>
                    <th>JUMLAH</th>
                    <th>%</th>
                </tr>
            </thead>
            <tbody id="tableBody"></tbody>
            <tfoot>
                <tr id="totalRow" class="summary-row"></tr>
            </tfoot>
        </table>
    </div>

    <div id="lateSection" class="dashboard-container">
        <h3 style="display:flex; align-items:center; gap:10px; color: var(--lewat);">
            <i data-lucide="user-x"></i> Senarai Murid Lewat
        </h3>
        <table id="lateStudentsTable">
            <thead>
                <tr>
                    <th>NAMA</th>
                    <th>KELAS</th>
                    <th>WAKTU</th>
                    <th>STATUS</th>
                </tr>
            </thead>
            <tbody id="lateTableBody"></tbody>
        </table>
    </div>
</div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
    import { getFirestore, collection, getDocs, query, where } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

    const firebaseConfig = {
        apiKey: "AIzaSyCqY9ADs8oy1Uvh3-7eVCQLYfyTijm8lo4",
        authDomain: "bdpsemsira-5c274.firebaseapp.com",
        projectId: "bdpsemsira-5c274",
        storageBucket: "bdpsemsira-5c274.firebasestorage.app",
        messagingSenderId: "176946808975",
        appId: "1:176946808975:web:ef7447a11bb57fe71b88fa"
    };

    const app = initializeApp(firebaseConfig);
    const db = getFirestore(app);

    window.myChart = null;
    const allStaticClasses = [
        "6 AISHAH", "6 FATIMAH", "6 KHADIJAH", "6 RUQAYYAH", 
        "6 SARAH", "6 SUMAYYAH", "6 UMMU KALYHOM", "6 ZAINAB",
        "6 AL FARABI", "6 AL GHAZALI", "6 AL KHINDI", "6 AL MAWARDI", 
        "6 AL RAZI", "6 IBNU KHALDUN", "6 IBNU RUSYD"
    ].sort();

    // --- 截图功能逻辑 ---
    window.captureSpecific = async (mode) => {
        const graph = document.getElementById('graphSection');
        const report = document.getElementById('reportSection');
        const late = document.getElementById('lateSection');

        // 隐藏不相关的部分
        if(mode === 'graph') { report.classList.add('hide-for-shot'); late.classList.add('hide-for-shot'); }
        if(mode === 'result') { graph.classList.add('hide-for-shot'); late.classList.add('hide-for-shot'); }

        const element = document.getElementById('fullReportWrapper');
        const canvas = await html2canvas(element, { scale: 2, backgroundColor: "#F2F2F7", useCORS: true });
        
        const link = document.createElement('a');
        link.download = `Semsira_${mode}_${new Date().getTime()}.png`;
        link.href = canvas.toDataURL();
        link.click();

        // 恢复显示
        report.classList.remove('hide-for-shot');
        graph.classList.remove('hide-for-shot');
        late.classList.remove('hide-for-shot');
    };

    // --- Cetak (PDF) 导出逻辑 ---
    window.exportFullPDF = async () => {
        const { jsPDF } = window.jspdf;
        const pdf = new jsPDF('p', 'mm', 'a4');
        const wrapper = document.getElementById('fullReportWrapper');
        const sections = ['graphSection', 'reportSection', 'lateSection'];

        for (let i = 0; i < sections.length; i++) {
            // 每次只显示页眉 + 当前 section
            sections.forEach(id => document.getElementById(id).classList.add('hide-for-shot'));
            document.getElementById(sections[i]).classList.remove('hide-for-shot');

            const canvas = await html2canvas(wrapper, { scale: 2, backgroundColor: "#F2F2F7", useCORS: true });
            const imgData = canvas.toDataURL('image/png');
            
            const imgProps = pdf.getImageProperties(imgData);
            const pdfWidth = pdf.internal.pageSize.getWidth();
            const pdfHeight = (imgProps.height * pdfWidth) / imgProps.width;

            if (i !== 0) pdf.addPage();
            pdf.addImage(imgData, 'PNG', 0, 0, pdfWidth, pdfHeight);
        }

        // 恢复
        sections.forEach(id => document.getElementById(id).classList.remove('hide-for-shot'));
        pdf.save(`Laporan_Penuh_Semsira_${new Date().toLocaleDateString()}.pdf`);
    };

    function updateLiveDateTime() {
        const now = new Date();
        const days = ["Ahad", "Isnin", "Selasa", "Rabu", "Khamis", "Jumaat", "Sabtu"];
        document.getElementById('current-date').innerText = "Tarikh: " + now.toLocaleDateString('ms-MY');
        document.getElementById('current-time').innerText = "Masa: " + now.toLocaleTimeString('ms-MY');
        document.getElementById('display-day').innerText = "Hari: " + days[now.getDay()];
    }

    async function loadDashboard() {
        const studentSnap = await getDocs(collection(db, "studentInform"));
        let classMasterData = {}; 
        
        // 初始化 16 个班级，确保即使没数据也显示 N/A
        allStaticClasses.forEach(c => {
            classMasterData[c] = { total: 0, k1: 0, k2: 0, late: 0, hasData: false };
        });

        studentSnap.forEach(doc => {
            const data = doc.data();
            if (classMasterData[data.className]) {
                classMasterData[data.className].total++;
                classMasterData[data.className].hasData = true;
            }
        });

        const todayStr = new Date().toISOString().split('T')[0];
        const attendSnap = await getDocs(query(collection(db, "attendanceLogs"), where("date", "==", todayStr)));
        
        let lateStudents = [];
        attendSnap.forEach(doc => {
            const data = doc.data();
            const cName = data.className;
            if (classMasterData[cName]) {
                if (data.status === "Lewat") {
                    classMasterData[cName].late++;
                    lateStudents.push(data);
                } else {
                    // 逻辑模拟：假设一半进 K1 一半进 K2
                    classMasterData[cName].k1++; 
                }
            }
        });
        updateUI(classMasterData, lateStudents);
    }

    function updateUI(data, lateStudents) {
        const tableBody = document.getElementById('tableBody');
        let labels = [], k1Data = [], k2Data = [];
        let gT = 0, gK1 = 0, gK2 = 0, gL = 0;

        tableBody.innerHTML = "";
        allStaticClasses.forEach(className => {
            const item = data[className] || { total: 0, k1: 0, k2: 0, late: 0, hasData: false };
            const totalHadir = item.k1 + item.k2 + item.late;
            const per = item.total > 0 ? ((totalHadir / item.total) * 100).toFixed(2) : "N/A";
            
            gT += item.total; gK1 += item.k1; gK2 += item.k2; gL += item.late;
            labels.push(className);
            k1Data.push(item.hasData ? item.k1 : 0);
            k2Data.push(item.hasData ? item.k2 : 0);

            tableBody.innerHTML += `
                <tr>
                    <td>${className}</td>
                    <td>${item.hasData ? item.total : 'N/A'}</td>
                    <td>${item.hasData ? item.k1 : 'N/A'}</td>
                    <td>${item.hasData ? item.k2 : 'N/A'}</td>
                    <td class="lewat-text">${item.hasData ? item.late : 'N/A'}</td>
                    <td>${item.hasData ? totalHadir : 'N/A'}</td>
                    <td>${per}${item.hasData ? '%' : ''}</td>
                </tr>`;
        });

        document.getElementById('totalRow').innerHTML = `
            <td class="total-label">JUMLAH</td><td>${gT}</td><td>${gK1}</td><td>${gK2}</td>
            <td>${gL}</td><td>${gK1+gK2+gL}</td><td>${gT > 0 ? (((gK1+gK2+gL)/gT)*100).toFixed(2) : 0}%</td>`;

        document.getElementById('lateTableBody').innerHTML = lateStudents.length > 0 ? 
            lateStudents.map(s => `<tr><td>${s.name}</td><td>${s.className}</td><td>${s.time || '--'}</td><td class="lewat-text">LEWAT</td></tr>`).join('') : 
            `<tr><td colspan="4">Tiada rekod lewat.</td></tr>`;

        renderChart(labels, k1Data, k2Data);
        lucide.createIcons();
    }

    function renderChart(labels, k1, k2) {
        const ctx = document.getElementById('attendanceChart').getContext('2d');
        if(window.myChart) window.myChart.destroy();

        window.myChart = new Chart(ctx, {
            type: 'bar',
            data: { 
                labels: labels, 
                datasets: [
                    { label: 'Hadir K1', data: k1, backgroundColor: '#34C759' },
                    { label: 'Hadir K2', data: k2, backgroundColor: '#007AFF' }
                ] 
            },
            options: {
                responsive: true,
                maintainAspectRatio: false,
                scales: {
                    x: { ticks: { font: { size: 9 }, maxRotation: 45 } },
                    y: { beginAtZero: true }
                },
                plugins: { legend: { position: 'bottom' } }
            }
        });
    }

    // --- 辅助功能 ---
    window.toggleManualPanel = () => {
        const p = document.getElementById('manualPanel');
        p.style.display = p.style.display === 'block' ? 'none' : 'block';
    };
    
    window.addRow = () => {
        const div = document.createElement('div');
        div.className = 'input-row';
        div.innerHTML = `<select class="m-class-select">${allStaticClasses.map(c => `<option value="${c}">${c}</option>`).join('')}</select>
                         <input type="text" placeholder="K1 (e.g. 8/10)" class="m-k1" style="border-color: #34C759;">
                         <input type="text" placeholder="K2 (e.g. 7/10)" class="m-k2" style="border-color: #007AFF;">
                         <button class="btn-action" style="background:#FF3B30;" onclick="removeRow(this)">Padam</button>`;
        document.getElementById('manualInputs').appendChild(div);
    };

    window.removeRow = (b) => b.parentElement.remove();

    window.applyManualData = () => {
        const selects = document.querySelectorAll('.m-class-select');
        const k1Inputs = document.querySelectorAll('.m-k1');
        const k2Inputs = document.querySelectorAll('.m-k2');
        let m = {};

        // 初始化
        allStaticClasses.forEach(c => m[c] = { total: 0, k1: 0, k2: 0, late: 0, hasData: false });

        selects.forEach((sel, i) => {
            const valK1 = k1Inputs[i].value.split('/');
            const valK2 = k2Inputs[i].value.split('/');
            const name = sel.value;
            
            if(valK1.length === 2 && valK2.length === 2) {
                m[name].k1 = parseInt(valK1[0]);
                m[name].k2 = parseInt(valK2[0]);
                m[name].total = parseInt(valK1[1]) + parseInt(valK2[1]);
                m[name].hasData = true;
            }
        });
        updateUI(m, []);
    };

    window.resetToFirebase = () => loadDashboard();

    // 初始化下拉菜单
    document.querySelectorAll('.m-class-select').forEach(s => {
        s.innerHTML = allStaticClasses.map(c => `<option value="${c}">${c}</option>`).join('');
    });

    setInterval(updateLiveDateTime, 1000);
    updateLiveDateTime();
    loadDashboard();
</script>
</body>
</html>
