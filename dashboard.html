<!DOCTYPE html>
<html lang="ms">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard Kehadiran Semsira</title>
    <link rel="icon" type="image/png" href="/semsira.png">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        :root {
            --primary: #007AFF;
            --bg: #F2F2F7;
            --card: #FFFFFF;
        }

        body {
            font-family: -apple-system, sans-serif;
            background-color: var(--bg);
            margin: 0;
            padding: 20px;
        }

        /* Header Styling with Logo */
        .header-container {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
        }

        .header-logo {
            display: flex;
            align-items: center;
            gap: 15px;
        }

        .header-logo img {
            width: 50px;
            height: 50px;
            border-radius: 10px;
        }

        .btn-print {
            background: var(--primary);
            color: white;
            border: none;
            padding: 10px 20px;
            border-radius: 8px;
            cursor: pointer;
            display: flex;
            align-items: center;
            gap: 8px;
            font-weight: bold;
        }

        .dashboard-container {
            background: var(--card);
            padding: 20px;
            border-radius: 15px;
            box-shadow: 0 4px 10px rgba(0,0,0,0.05);
        }

        canvas { max-width: 100%; margin-bottom: 30px; }

        table {
            width: 100%;
            border-collapse: collapse;
            margin-top: 20px;
            background: white;
        }

        th, td {
            border: 1px solid #ddd;
            padding: 12px;
            text-align: center;
        }

        /* Table Coloring */
        th { 
            background-color: #D0E1F9 !important; 
            color: #000;
            font-weight: bold; 
            -webkit-print-color-adjust: exact;
        }
        .summary-row { 
            background-color: #FFEB3B !important; 
            font-weight: bold; 
            -webkit-print-color-adjust: exact;
        }
        .total-label {
            background-color: #FF9800 !important;
            color: white !important;
            -webkit-print-color-adjust: exact;
        }

        /* Print Optimization */
        @media print {
            @page {
                margin: 0.5cm; /* 设置页边距，去除浏览器默认Header/Footer */
            }
            body { 
                padding: 20px; 
                background: white; 
            }
            .no-print { 
                display: none !important; 
            }
            .dashboard-container { 
                box-shadow: none; 
                padding: 0;
            }
            table { 
                font-size: 11px; 
            }
            /* 确保打印时保留颜色 */
            th, .summary-row, .total-label {
                -webkit-print-color-adjust: exact;
                print-color-adjust: exact;
            }
        }
    </style>
</head>
<body>

<div class="header-container">
    <div class="header-logo">
        <img src="/semsira.png" alt="Logo Semsira">
        <h2>Analisis Kehadiran Murid (Harian)</h2>
    </div>
    <button class="btn-print no-print" onclick="window.print()">
        <i data-lucide="printer"></i> Cetak Laporan
    </button>
</div>

<div class="dashboard-container">
    <canvas id="attendanceChart" height="100"></canvas>

    <table id="attendanceTable">
        <thead>
            <tr>
                <th>KELAS</th>
                <th>BILANGAN MURID</th>
                <th>BIL. HADIR</th>
                <th>PERATUS KEHADIRAN (%)</th>
            </tr>
        </thead>
        <tbody id="tableBody">
            </tbody>
        <tfoot>
            <tr id="totalRow" class="summary-row">
                </tr>
        </tfoot>
    </table>
</div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
    import { getFirestore, collection, getDocs, query, where } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

    const firebaseConfig = {
        apiKey: "AIzaSyCqY9ADs8oy1Uvh3-7eVCQLYfyTijm8lo4",
        authDomain: "bdpsemsira-5c274.firebaseapp.com",
        projectId: "bdpsemsira-5c274",
        storageBucket: "bdpsemsira-5c274.firebasestorage.app",
        messagingSenderId: "176946808975",
        appId: "1:176946808975:web:ef7447a11bb57fe71b88fa"
    };

    const app = initializeApp(firebaseConfig);
    const db = getFirestore(app);

    async function loadDashboard() {
        const studentSnap = await getDocs(collection(db, "studentInform"));
        let classMasterData = {}; 

        studentSnap.forEach(doc => {
            const data = doc.data();
            const className = data.className || "Lain-lain";
            if (!classMasterData[className]) {
                classMasterData[className] = { total: 0, present: 0 };
            }
            classMasterData[className].total++;
        });

        const todayStr = new Date().toISOString().split('T')[0];
        const attendQuery = query(collection(db, "attendanceLogs"), where("date", "==", todayStr));
        const attendSnap = await getDocs(attendQuery);

        attendSnap.forEach(doc => {
            const data = doc.data();
            if (classMasterData[data.className]) {
                classMasterData[data.className].present++;
            }
        });

        updateUI(classMasterData);
    }

    function updateUI(data) {
        const tableBody = document.getElementById('tableBody');
        const totalRow = document.getElementById('totalRow');
        let labels = [];
        let percentages = [];
        
        let grandTotalMurid = 0;
        let grandTotalHadir = 0;

        tableBody.innerHTML = "";

        const sortedClasses = Object.keys(data).sort();

        sortedClasses.forEach(className => {
            const item = data[className];
            const percent = item.total > 0 ? ((item.present / item.total) * 100).toFixed(2) : "0.00";
            
            grandTotalMurid += item.total;
            grandTotalHadir += item.present;

            labels.push(className);
            percentages.push(percent);

            const row = `
                <tr>
                    <td>${className}</td>
                    <td>${item.total}</td>
                    <td>${item.present}</td>
                    <td>${percent}%</td>
                </tr>
            `;
            tableBody.innerHTML += row;
        });

        const grandPercent = grandTotalMurid > 0 ? ((grandTotalHadir / grandTotalMurid) * 100).toFixed(2) : "0.00";
        totalRow.innerHTML = `
            <td class="total-label">JUMLAH KESELURUHAN</td>
            <td>${grandTotalMurid}</td>
            <td>${grandTotalHadir}</td>
            <td>${grandPercent}%</td>
        `;

        renderChart(labels, percentages);
        lucide.createIcons();
    }

    function renderChart(labels, values) {
        const ctx = document.getElementById('attendanceChart').getContext('2d');
        new Chart(ctx, {
            type: 'bar',
            data: {
                labels: labels,
                datasets: [{
                    label: 'Peratus Kehadiran (%)',
                    data: values,
                    backgroundColor: '#007AFF',
                    borderRadius: 5
                }]
            },
            options: {
                responsive: true,
                animation: {
                    onComplete: function () {
                        // 确保图表加载后再打印时可见
                    }
                },
                scales: {
                    y: { beginAtZero: true, max: 100 }
                }
            }
        });
    }

    loadDashboard();
</script>
</body>
</html>
