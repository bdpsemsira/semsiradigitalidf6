<!DOCTYPE html>
<html lang="ms">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard Kehadiran Semsira</title>
    <link rel="icon" type="image/png" href="/semsira.png">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <script src="https://html2canvas.hertzen.com/dist/html2canvas.min.js"></script>
    <style>
        :root {
            --primary: #007AFF;
            --lewat: #FF9500;
            --bg: #F2F2F7;
            --card: #FFFFFF;
        }

        body {
            font-family: -apple-system, sans-serif;
            background-color: var(--bg);
            margin: 0;
            padding: 20px;
        }

        .screenshot-target {
            background: var(--bg);
            padding: 15px;
            border-radius: 15px;
        }

        .header-container {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 10px;
        }

        .header-logo {
            display: flex;
            align-items: center;
            gap: 15px;
        }

        .header-logo img {
            width: 50px;
            height: 50px;
            border-radius: 10px;
        }

        .date-time-info {
            background: white;
            padding: 10px 15px;
            border-radius: 10px;
            margin-bottom: 10px;
            display: flex;
            justify-content: space-between;
            font-weight: 600;
            color: #1c1c1e;
            box-shadow: 0 2px 5px rgba(0,0,0,0.05);
        }

        .button-group {
            display: flex;
            gap: 10px;
        }

        .btn-action {
            color: white;
            border: none;
            padding: 8px 15px;
            border-radius: 8px;
            cursor: pointer;
            display: flex;
            align-items: center;
            gap: 6px;
            font-weight: bold;
            font-size: 13px;
            transition: opacity 0.2s;
        }

        .btn-action:hover { opacity: 0.8; }
        .bg-primary { background: var(--primary); }
        .bg-purple { background: #5856D6; }
        .bg-green { background: #34C759; }

        .dashboard-container {
            background: var(--card);
            padding: 20px;
            border-radius: 15px;
            box-shadow: 0 4px 10px rgba(0,0,0,0.05);
            margin-bottom: 20px;
            position: relative;
        }

        .section-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 15px;
        }

        /* 手动输入面板改为放在日期下方 */
        .manual-panel {
            display: none;
            background: #E5E5EA;
            padding: 20px;
            border-radius: 15px;
            margin-bottom: 20px;
        }

        .input-row {
            display: flex;
            gap: 10px;
            margin-bottom: 10px;
            flex-wrap: wrap;
        }

        .input-row select, .input-row input {
            padding: 10px;
            border-radius: 8px;
            border: 1px solid #ccc;
            flex: 1;
            min-width: 150px;
        }

        .chart-wrapper {
            width: 100%;
            overflow-x: auto;
        }

        canvas { min-width: 600px; }

        table {
            width: 100%;
            border-collapse: collapse;
            margin-top: 10px;
            background: white;
        }

        th, td {
            border: 1px solid #ddd;
            padding: 12px;
            text-align: center;
        }

        th { 
            background-color: #D0E1F9 !important; 
            color: #000;
            font-weight: bold; 
        }
        .summary-row { background-color: #FFEB3B !important; font-weight: bold; }
        .total-label { background-color: #FF9800 !important; color: white !important; }
        .lewat-text { color: var(--lewat); font-weight: bold; }
        .hide-lewat-column { display: none !important; }

        @media print {
            .no-print, .btn-action, .section-header { display: none !important; }
            body { padding: 0; background: white; }
            .dashboard-container { box-shadow: none; border: none; }
            .screenshot-target { padding: 0; }
        }

        .is-capturing .no-print, 
        .is-capturing .btn-action, 
        .is-capturing .section-header { 
            display: none !important; 
        }
    </style>
</head>
<body>

<div id="fullReportWrapper" class="screenshot-target">
    <div class="header-container">
        <div class="header-logo">
            <img src="/semsira.png" alt="Logo Semsira">
            <div>
                <h2 style="margin:0;">Analisis Kehadiran Murid</h2>
                <small id="display-day-top" style="color:#666;">Hari: --</small>
            </div>
        </div>
        <div class="button-group no-print">
            <button class="btn-action bg-purple" onclick="toggleManualPanel()">
                <i data-lucide="edit-3"></i> Input
            </button>
            <button class="btn-action bg-primary" onclick="captureFullReport('all')">
                <i data-lucide="camera"></i> Screenshot
            </button>
        </div>
    </div>

    <div class="date-time-info">
        <span id="current-date">Tarikh: --/--/----</span>
        <span id="current-time">Masa: --:--</span>
    </div>

    <div id="manualPanel" class="manual-panel no-print">
        <h3>Input Data Manual</h3>
        <div id="manualInputs">
            <div class="input-row">
                <select class="m-class-select"></select>
                <input type="text" placeholder="Kehadiran (e.g. 8/10)" class="m-data">
                <button class="btn-action" style="background:#FF3B30;" onclick="removeRow(this)">Padam</button>
            </div>
        </div>
        <div style="margin-top:15px; display:flex; gap:10px;">
            <button class="btn-action bg-green" onclick="addRow()">+ Tambah Baris</button>
            <button class="btn-action bg-primary" onclick="applyManualData()">Jana Laporan</button>
            <button class="btn-action" style="background:#8E8E93;" onclick="resetToFirebase()">Reset</button>
        </div>
    </div>

    <div class="dashboard-container" id="graphSection">
        <div class="chart-wrapper">
            <canvas id="attendanceChart" height="400"></canvas>
        </div>
    </div>

    <div class="dashboard-container" id="reportSection">
        <table id="attendanceTable">
            <thead>
                <tr>
                    <th>KELAS</th>
                    <th>BIL. MURID</th>
                    <th>HADIR</th>
                    <th class="lewat-col">LEWAT</th>
                    <th>JUMLAH HADIR</th>
                    <th>%</th>
                </tr>
            </thead>
            <tbody id="tableBody"></tbody>
            <tfoot>
                <tr id="totalRow" class="summary-row"></tr>
            </tfoot>
        </table>
    </div>

    <div id="lateSection" class="dashboard-container">
        <h3 style="display:flex; align-items:center; gap:10px; color: var(--lewat); margin-top:0;">
            <i data-lucide="user-x"></i> Senarai Murid Lewat
        </h3>
        <table id="lateStudentsTable">
            <thead>
                <tr>
                    <th>NAMA</th>
                    <th>KELAS</th>
                    <th>WAKTU</th>
                    <th>STATUS</th>
                </tr>
            </thead>
            <tbody id="lateTableBody"></tbody>
        </table>
    </div>
</div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
    import { getFirestore, collection, getDocs, query, where } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

    const firebaseConfig = {
        apiKey: "AIzaSyCqY9ADs8oy1Uvh3-7eVCQLYfyTijm8lo4",
        authDomain: "bdpsemsira-5c274.firebaseapp.com",
        projectId: "bdpsemsira-5c274",
        storageBucket: "bdpsemsira-5c274.firebasestorage.app",
        messagingSenderId: "176946808975",
        appId: "1:176946808975:web:ef7447a11bb57fe71b88fa"
    };

    const app = initializeApp(firebaseConfig);
    const db = getFirestore(app);

    window.myChart = null;

    const sem2Classes = ["6 AISHAH", "6 FATIMAH", "6 KHADIJAH", "6 RUQAYYAH", "6 SARAH", "6 SUMAYYAH", "6 UMMU KALYHOM", "6 ZAINAB"];
    const sem1Classes = ["6 AL FARABI", "6 AL GHAZALI", "6 AL KHINDI", "6 AL MAWARDI", "6 AL RAZI", "6 IBNU KHALDUN", "6 IBNU RUSYD"];
    const allStaticClasses = [...sem2Classes, ...sem1Classes];

    function sortClasses(classA, classB) {
        return allStaticClasses.indexOf(classA) - allStaticClasses.indexOf(classB);
    }

    // 截图全屏功能
    window.captureFullReport = async (type) => {
        const wrapper = document.getElementById('fullReportWrapper');
        wrapper.classList.add('is-capturing');
        
        const now = new Date();
        const dateStr = now.toISOString().slice(0,10).replace(/-/g, '');
        const timeStr = now.getHours() + "" + now.getMinutes();
        const fileName = `semsira_report_${dateStr}_${timeStr}.png`;

        try {
            const canvas = await html2canvas(wrapper, {
                useCORS: true,
                scale: 2,
                backgroundColor: "#F2F2F7",
                ignoreElements: (el) => el.classList.contains('no-print')
            });
            const link = document.createElement('a');
            link.download = fileName;
            link.href = canvas.toDataURL("image/png");
            link.click();
        } catch (e) {
            alert("Ralat tangkapan skrin.");
        } finally {
            wrapper.classList.remove('is-capturing');
        }
    };

    function updateLiveDateTime() {
        const now = new Date();
        const days = ["Ahad", "Isnin", "Selasa", "Rabu", "Khamis", "Jumaat", "Sabtu"];
        const dayName = days[now.getDay()];
        const dateFormatted = now.toLocaleDateString('en-GB'); // DD/MM/YYYY
        
        // 修改日期显示，增加星期名称 (2/4/2026 Khamis)
        document.getElementById('current-date').innerText = `Tarikh: ${dateFormatted} ${dayName}`;
        
        // Waktu 只要小时和分钟
        const hours = String(now.getHours()).padStart(2, '0');
        const minutes = String(now.getMinutes()).padStart(2, '0');
        const ampm = now.getHours() >= 12 ? 'PTG' : 'PG';
        document.getElementById('current-time').innerText = `Masa: ${hours}:${minutes} ${ampm}`;
        
        document.getElementById('display-day-top').innerText = "Hari: " + dayName;
    }

    async function loadDashboard() {
        const studentSnap = await getDocs(collection(db, "studentInform"));
        let classMasterData = {}; 
        studentSnap.forEach(doc => {
            const data = doc.data();
            const className = data.className || "Lain-lain";
            if (!classMasterData[className]) classMasterData[className] = { total: 0, present: 0, late: 0 };
            classMasterData[className].total++;
        });

        const today = new Date();
        const todayStr = today.toISOString().split('T')[0];
        const attendSnap = await getDocs(query(collection(db, "attendanceLogs"), where("date", "==", todayStr)));
        
        let lateStudents = [];
        attendSnap.forEach(doc => {
            const data = doc.data();
            if (classMasterData[data.className]) {
                let displayTime = "--:--";
                // 提取 timeFull 中的小时和分钟
                if (data.timeFull && data.timeFull.includes(",")) {
                    const timePart = data.timeFull.split(",")[1].trim(); // "9:15:21 PG"
                    const timeSplit = timePart.split(" "); // ["9:15:21", "PG"]
                    const hm = timeSplit[0].split(":").slice(0,2).join(":"); // "9:15"
                    displayTime = hm + " " + (timeSplit[1] || "");
                } else {
                    displayTime = data.time || "--:--";
                }

                if (data.status === "Lewat") {
                    classMasterData[data.className].late++;
                    lateStudents.push({ ...data, time: displayTime });
                } else {
                    classMasterData[data.className].present++;
                }
            }
        });
        updateUI(classMasterData, lateStudents);
    }

    function updateUI(data, lateStudents) {
        const tableBody = document.getElementById('tableBody');
        const isNoLewat = document.body.classList.contains('print-no-lewat');
        let labels = [], percentPresent = [], percentLate = [];
        let gT = 0, gP = 0, gL = 0;

        tableBody.innerHTML = "";
        const sortedClassKeys = Object.keys(data).sort(sortClasses);

        sortedClassKeys.forEach(className => {
            const item = data[className];
            const totalHadir = item.present + item.late;
            const per = item.total > 0 ? ((totalHadir / item.total) * 100).toFixed(2) : "0.00";
            gT += item.total; gP += item.present; gL += item.late;
            
            labels.push(className); 
            percentPresent.push(item.total > 0 ? (item.present / item.total * 100).toFixed(2) : 0);
            percentLate.push(item.total > 0 ? (item.late / item.total * 100).toFixed(2) : 0);

            tableBody.innerHTML += `
                <tr>
                    <td>${className}</td>
                    <td>${item.total}</td>
                    <td>${item.present}</td>
                    <td class="lewat-text ${isNoLewat ? 'hide-lewat-column' : ''}">${item.late}</td>
                    <td>${totalHadir}</td>
                    <td>${per}%</td>
                </tr>`;
        });

        const headerLewat = document.querySelector('.lewat-col');
        if(isNoLewat) headerLewat.classList.add('hide-lewat-column');
        else headerLewat.classList.remove('hide-lewat-column');

        document.getElementById('totalRow').innerHTML = `
            <td class="total-label">JUMLAH</td><td>${gT}</td><td>${gP}</td>
            <td class="${isNoLewat ? 'hide-lewat-column' : ''}">${gL}</td>
            <td>${gP+gL}</td><td>${gT > 0 ? (((gP+gL)/gT)*100).toFixed(2) : 0}%</td>`;

        document.getElementById('lateTableBody').innerHTML = lateStudents.length > 0 ? 
            lateStudents.map(s => `<tr><td>${s.name}</td><td>${s.className}</td><td>${s.time}</td><td class="lewat-text">LEWAT</td></tr>`).join('') : 
            `<tr><td colspan="4">Tiada rekod lewat hari ini.</td></tr>`;

        renderChart(labels, percentPresent, isNoLewat ? [] : percentLate);
        lucide.createIcons();
    }

    function renderChart(labels, pData, lData) {
        const ctx = document.getElementById('attendanceChart').getContext('2d');
        if(window.myChart) window.myChart.destroy();

        const isMany = labels.length > 10;
        window.myChart = new Chart(ctx, {
            type: 'bar',
            data: { 
                labels: labels, 
                datasets: [
                    { label: 'Hadir (%)', data: pData, backgroundColor: '#007AFF', borderRadius: 4, maxBarThickness: isMany ? 25 : 45 },
                    { label: 'Lewat (%)', data: lData, backgroundColor: '#FF9500', borderRadius: 4, maxBarThickness: isMany ? 25 : 45 }
                ] 
            },
            options: {
                responsive: true,
                maintainAspectRatio: false,
                scales: {
                    x: { 
                        stacked: true, 
                        ticks: { font: { size: isMany ? 10 : 12 }, maxRotation: 45, minRotation: 45 } 
                    },
                    y: { stacked: true, min: 0, max: 100, ticks: { callback: v => v+"%" } }
                },
                plugins: { legend: { position: 'bottom' } }
            }
        });
    }

    window.toggleManualPanel = () => {
        const p = document.getElementById('manualPanel');
        p.style.display = p.style.display === 'block' ? 'none' : 'block';
    };
    window.addRow = () => {
        const div = document.createElement('div');
        div.className = 'input-row';
        div.innerHTML = `<select class="m-class-select">${allStaticClasses.map(c => `<option value="${c}">${c}</option>`).join('')}</select>
                         <input type="text" placeholder="e.g. 8/10" class="m-data">
                         <button class="btn-action" style="background:#FF3B30;" onclick="removeRow(this)">Padam</button>`;
        document.getElementById('manualInputs').appendChild(div);
    };
    window.removeRow = (b) => b.parentElement.remove();
    window.applyManualData = () => {
        const s = document.querySelectorAll('.m-class-select'), d = document.querySelectorAll('.m-data');
        let m = {};
        for(let i=0; i<s.length; i++){
            if(!d[i].value.includes('/')) continue;
            const [h, t] = d[i].value.split('/').map(Number);
            if(!isNaN(h)) m[s[i].value] = { total: t || 0, present: h, late: 0 };
        }
        document.body.classList.add('print-no-lewat');
        updateUI(m, []);
    };
    window.resetToFirebase = () => {
        document.body.classList.remove('print-no-lewat');
        loadDashboard();
    };

    const selects = document.querySelectorAll('.m-class-select');
    const opts = allStaticClasses.map(c => `<option value="${c}">${c}</option>`).join('');
    selects.forEach(s => s.innerHTML = opts);

    setInterval(updateLiveDateTime, 1000);
    updateLiveDateTime();
    loadDashboard();
</script>
</body>
</html>
