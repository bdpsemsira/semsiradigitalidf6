<!DOCTYPE html>
<html lang="ms">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>Dashboard Kehadiran Semsira</title>
    <link rel="icon" type="image/png" href="/semsira.png">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <script src="https://html2canvas.hertzen.com/dist/html2canvas.min.js"></script>
    <style>
        :root {
            --primary: #007AFF;
            --lewat: #FF9500;
            --bg: #F2F2F7;
            --card: #FFFFFF;
            --success: #34C759;
            --danger: #FF3B30;
        }

        * {
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            background-color: var(--bg);
            margin: 0;
            padding: 16px;
            color: #1c1c1e;
        }

        @media (max-width: 768px) {
            body { padding: 12px; }
            .dashboard-container { padding: 16px !important; }
            .section-header { flex-direction: column; align-items: flex-start !important; gap: 12px; }
            .btn-action { flex: 1; justify-content: center; padding: 10px 12px !important; font-size: 12px !important; }
            .input-row { flex-direction: column; }
            .input-row select, .input-row input { width: 100%; }
            .date-selector-group { flex-direction: column; align-items: stretch !important; }
            table { font-size: 12px; display: block; overflow-x: auto; white-space: nowrap; }
            th, td { padding: 8px 4px !important; }
            .chart-wrapper { overflow-x: auto; display: flex; justify-content: center; }
            canvas { max-width: 95% !important; min-width: auto !important; height: auto !important; }
        }

        .screenshot-target { background: var(--bg); padding: 15px; border-radius: 15px; }
        .header-container { display: flex; justify-content: space-between; align-items: center; margin-bottom: 10px; flex-wrap: wrap; gap: 10px; }
        .header-logo { display: flex; align-items: center; gap: 15px; }
        .header-logo img { width: 50px; height: 50px; border-radius: 10px; }
        .date-time-info { background: white; padding: 10px 15px; border-radius: 10px; margin-bottom: 10px; display: flex; justify-content: space-between; font-weight: 600; flex-wrap: wrap; gap: 10px; box-shadow: 0 2px 5px rgba(0,0,0,0.05); }
        .btn-action { color: white; border: none; padding: 8px 15px; border-radius: 8px; cursor: pointer; display: flex; align-items: center; gap: 6px; font-weight: bold; font-size: 13px; transition: opacity 0.2s; }
        .btn-action:active { transform: scale(0.97); }
        .bg-primary { background: var(--primary); }
        .bg-teal { background: #5E5CE6; }
        .bg-orange { background: var(--lewat); }
        .dashboard-container { background: var(--card); padding: 20px; border-radius: 15px; box-shadow: 0 4px 10px rgba(0,0,0,0.05); margin-bottom: 20px; position: relative; }
        .section-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 15px; flex-wrap: wrap; gap: 10px; }
        .section-header h3 { margin: 0; display: flex; align-items: center; gap: 8px; }
        .manual-panel { display: none; background: #E5E5EA; padding: 20px; border-radius: 15px; margin-bottom: 20px; }
        .input-row { display: flex; gap: 10px; margin-bottom: 10px; flex-wrap: wrap; }
        .input-row select, .input-row input { padding: 10px; border-radius: 8px; border: 1px solid #ccc; flex: 1; min-width: 150px; }
        .date-selector-group { display: flex; align-items: center; gap: 12px; flex-wrap: wrap; background: #f8f9fc; padding: 10px 15px; border-radius: 12px; margin-bottom: 15px; }
        .date-selector-group label { font-weight: 600; }
        .chart-wrapper { width: 100%; display: flex; justify-content: center; overflow-x: auto; }
        .chart-inner { width: 80%; max-width: 800px; min-width: 300px; }
        canvas { width: 100% !important; height: auto !important; max-height: 400px; }
        
        /* ========== 表格居中样式 ========== */
        .table-wrapper {
            display: flex;
            justify-content: center;
            width: 100%;
        }
        table {
            width: 100%;
            max-width: 1200px;
            border-collapse: collapse;
            margin: 10px auto;
            background: white;
            display: table;
            overflow-x: auto;
        }
        th, td {
            border: 1px solid #ddd;
            padding: 12px;
            text-align: center;
            vertical-align: middle;
        }
        th {
            background-color: #D0E1F9 !important;
            color: #000;
            font-weight: bold;
            text-align: center;
        }
        /* 确保表格容器居中 */
        #tableCaptureArea, #lateCaptureArea {
            display: flex;
            justify-content: center;
            width: 100%;
        }
        #attendanceTable, #lateStudentsTable {
            margin-left: auto;
            margin-right: auto;
        }
        
        .summary-row { background-color: #FFEB3B !important; font-weight: bold; }
        .total-label { background-color: #FF9800 !important; color: white !important; }
        .lewat-text { color: var(--lewat); font-weight: bold; }
        .monthly-stats { font-size: 14px; margin-top: 10px; padding: 10px; background: #f9f9fb; border-radius: 10px; text-align: center; }
        .capture-mode .no-print, .capture-mode .btn-action, .capture-mode .section-header button, .capture-mode .date-selector-group { display: none !important; }
        .monthly-title { font-size: 18px; font-weight: bold; text-align: center; margin-bottom: 15px; color: #1c1c1e; }
        
        .screenshot-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.5);
            z-index: 10000;
            display: flex;
            align-items: center;
            justify-content: center;
            flex-direction: column;
        }
        .screenshot-loading {
            background: white;
            padding: 20px 40px;
            border-radius: 12px;
            font-size: 16px;
            font-weight: bold;
            box-shadow: 0 4px 20px rgba(0,0,0,0.2);
        }
        
        /* 移动端适配 */
        @media (max-width: 768px) {
            table {
                display: block;
                overflow-x: auto;
                white-space: nowrap;
            }
            #tableCaptureArea, #lateCaptureArea {
                display: block;
                overflow-x: auto;
            }
        }
    </style>
</head>
<body>

<div id="fullReportWrapper">
    <div class="screenshot-target" id="mainScreenshotArea" style="background: var(--bg);">
        <div class="header-container">
            <div class="header-logo">
                <img src="/semsira.png" alt="Logo Semsira" crossorigin="anonymous">
                <div><h2 style="margin:0;">Analisis Kehadiran Murid</h2><small id="display-day-top" style="color:#666;">Hari: --</small></div>
            </div>
        </div>
        <div class="date-time-info"><span id="current-date">Tarikh: --/--/----</span><span id="current-time">Masa: --:--</span></div>
    </div>

    <div class="date-selector-group no-print" style="background: white; border-radius: 16px; margin-bottom: 20px;">
        <div style="display: flex; align-items: center; gap: 10px; flex-wrap: wrap;">
            <label>📅 Pilih Tarikh:</label>
            <input type="date" id="datePicker" style="flex:1; min-width: 160px;">
            <button class="btn-action bg-primary" onclick="loadDashboardByDate()">📊 Papar</button>
        </div>
    </div>

    <div id="manualPanel" class="manual-panel no-print">
        <h3>Input Data Manual</h3>
        <div id="manualInputs"><div class="input-row"><select class="m-class-select"></select><input type="text" placeholder="e.g. 8/10" class="m-data"><button class="btn-action" style="background:#FF3B30;" onclick="removeRow(this)">Padam</button></div></div>
        <div style="margin-top:15px; display:flex; gap:10px; flex-wrap:wrap;"><button class="btn-action bg-primary" onclick="addRow()">+ Tambah Baris</button><button class="btn-action bg-primary" onclick="applyManualData()">Jana Laporan</button><button class="btn-action" style="background:#8E8E93;" onclick="resetToFirebase()">Reset</button></div>
    </div>

    <div class="dashboard-container" id="graphSection">
        <div class="section-header"><h3><i data-lucide="bar-chart-2"></i> Graf Kehadiran & Keterlewatan</h3><button class="btn-action bg-teal" onclick="captureGraphOnly()"><i data-lucide="camera"></i> Screenshot Graf</button></div>
        <div class="chart-wrapper"><div class="chart-inner"><canvas id="attendanceChart" height="400"></canvas></div></div>
    </div>

    <div class="dashboard-container" id="reportSection">
        <div class="section-header"><h3><i data-lucide="table"></i> Ringkasan Kehadiran Mengikut Kelas</h3><button class="btn-action bg-teal" onclick="captureTableSection()"><i data-lucide="camera"></i> Screenshot Jadual</button></div>
        <div id="tableCaptureArea">
            <table id="attendanceTable">
                <thead>
                    <tr>
                        <th>KELAS</th>
                        <th>BIL. MURID</th>
                        <th>HADIR</th>
                        <th class="lewat-col">LEWAT</th>
                        <th>JUMLAH HADIR</th>
                        <th>%</th>
                    </tr>
                </thead>
                <tbody id="tableBody"></tbody>
                <tfoot>
                    <tr id="totalRow" class="summary-row"><td></tfoot>
            </table>
        </div>
    </div>

    <div id="lateSection" class="dashboard-container">
        <div class="section-header"><h3 style="color: var(--lewat);"><i data-lucide="user-x"></i> Senarai Murid Lewat</h3><button class="btn-action bg-orange" onclick="captureLateSection()"><i data-lucide="camera"></i> Screenshot Senarai</button></div>
        <div id="lateCaptureArea">
            <table id="lateStudentsTable">
                <thead>
                    <tr>
                        <th>NAMA</th>
                        <th>KELAS</th>
                        <th>WAKTU</th>
                        <th>STATUS</th>
                    </tr>
                </thead>
                <tbody id="lateTableBody"></tbody>
            </table>
        </div>
    </div>

    <div class="dashboard-container" id="monthlyReportSection">
        <div class="section-header">
            <h3><i data-lucide="calendar"></i> Laporan Bulanan</h3>
            <div style="display: flex; gap: 10px; flex-wrap: wrap;">
                <select id="monthPicker" style="padding: 8px 12px; border-radius: 10px; border:1px solid #ccc;">
                    <option value="0">Januari</option><option value="1">Februari</option><option value="2">Mac</option><option value="3">April</option><option value="4">Mei</option><option value="5">Jun</option><option value="6">Julai</option><option value="7">Ogos</option><option value="8">September</option><option value="9">Oktober</option><option value="10">November</option><option value="11">Disember</option>
                </select>
                <input type="number" id="yearPicker" style="width: 80px; padding: 8px; border-radius: 10px; border:1px solid #ccc;" placeholder="Tahun">
                <button class="btn-action bg-primary" onclick="loadMonthlyReport()">📊 Papar Bulanan</button>
                <button class="btn-action bg-teal" onclick="captureMonthlySection()"><i data-lucide="camera"></i> Screenshot Bulanan</button>
            </div>
        </div>
        <div id="monthlyCaptureArea">
            <div id="monthlyReportContent" style="min-height: 150px; text-align: center; padding: 20px;"><i data-lucide="loader-circle"></i> Memuatkan laporan bulanan...</div>
        </div>
    </div>
</div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
    import { getFirestore, collection, getDocs, query, where } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

    const firebaseConfig = {
        apiKey: "AIzaSyCqY9ADs8oy1Uvh3-7eVCQLYfyTijm8lo4",
        authDomain: "bdpsemsira-5c274.firebaseapp.com",
        projectId: "bdpsemsira-5c274",
        storageBucket: "bdpsemsira-5c274.firebasestorage.app",
        messagingSenderId: "176946808975",
        appId: "1:176946808975:web:ef7447a11bb57fe71b88fa"
    };

    const app = initializeApp(firebaseConfig);
    const db = getFirestore(app);

    window.myChart = null;
    window.monthlyChart = null;
    let currentClassMasterData = {};

    const sem2Classes = ["6 AISHAH", "6 FATIMAH", "6 KHADIJAH", "6 RUQAYYAH", "6 SARAH", "6 SUMAYYAH", "6 UMMU KALYHOM", "6 ZAINAB"];
    const sem1Classes = ["6 AL FARABI", "6 AL GHAZALI", "6 AL KHINDI", "6 AL MAWARDI", "6 AL RAZI", "6 IBNU KHALDUN", "6 IBNU RUSYD"];
    const allStaticClasses = [...sem2Classes, ...sem1Classes];
    const EXCLUDED_CLASS = "GURU BDP";

    function sortClasses(a, b) { return allStaticClasses.indexOf(a) - allStaticClasses.indexOf(b); }
    
    // ========== 获取马来西亚当前日期 (YYYY-MM-DD 格式) ==========
    function getMalaysiaDate() {
        const now = new Date();
        const malaysiaTime = new Date(now.getTime() + (8 * 60 * 60 * 1000));
        const year = malaysiaTime.getUTCFullYear();
        const month = String(malaysiaTime.getUTCMonth() + 1).padStart(2, '0');
        const day = String(malaysiaTime.getUTCDate()).padStart(2, '0');
        return `${year}-${month}-${day}`;
    }
    
    // ========== 格式化马来西亚日期显示 ==========
    function formatMalaysiaDate() {
        const now = new Date();
        const malaysiaTime = new Date(now.getTime() + (8 * 60 * 60 * 1000));
        const days = ["Ahad", "Isnin", "Selasa", "Rabu", "Khamis", "Jumaat", "Sabtu"];
        const day = days[malaysiaTime.getUTCDay()];
        const date = malaysiaTime.getUTCDate();
        const month = malaysiaTime.getUTCMonth() + 1;
        const year = malaysiaTime.getUTCFullYear();
        return { dateStr: `${date}/${month}/${year}`, day, year, month, date };
    }
    
    function updateLiveDateTime() {
        const { dateStr, day } = formatMalaysiaDate();
        const now = new Date();
        const malaysiaTime = new Date(now.getTime() + (8 * 60 * 60 * 1000));
        const hours = String(malaysiaTime.getUTCHours()).padStart(2,'0');
        const minutes = String(malaysiaTime.getUTCMinutes()).padStart(2,'0');
        const ampm = malaysiaTime.getUTCHours() >= 12 ? 'PTG' : 'PG';
        document.getElementById('current-date').innerText = `Tarikh: ${dateStr} ${day}`;
        document.getElementById('current-time').innerText = `Masa: ${hours}:${minutes} ${ampm}`;
        document.getElementById('display-day-top').innerText = "Hari: " + day;
    }

    window.loadDashboardByDate = async () => {
        const dateInput = document.getElementById('datePicker').value;
        if (!dateInput) return alert("Sila pilih tarikh.");
        await loadDashboardForDate(dateInput);
    };

    function renderTable(data, lateStudentsArray) {
        const tbody = document.getElementById('tableBody');
        const tfoot = document.getElementById('totalRow');
        if (!tbody) return;
        
        let totalStudents = 0, totalHadir = 0, totalLewat = 0;
        let html = '';
        const sortedClasses = Object.keys(data).sort(sortClasses);
        
        for (let className of sortedClasses) {
            const item = data[className] || { total: 0, present: 0, late: 0 };
            const presentCount = item.present || 0;
            const lateCount = item.late || 0;
            const totalHadirClass = presentCount + lateCount;
            const percent = item.total > 0 ? ((totalHadirClass / item.total) * 100).toFixed(2) : "0.00";
            
            totalStudents += item.total;
            totalHadir += totalHadirClass;
            totalLewat += lateCount;
            
            html += `<tr>
                        <td style="font-weight:500;">${className}</td>
                        <td>${item.total}</td>
                        <td>${presentCount}</td>
                        <td class="lewat-text">${lateCount}</td>
                        <td>${totalHadirClass}</td>
                        <td>${percent}%</td>
                      </tr>`;
        }
        const overallPercent = totalStudents > 0 ? ((totalHadir / totalStudents) * 100).toFixed(2) : "0.00";
        tfoot.innerHTML = `<tr class="summary-row">
                            <td class="total-label"><b>JUMLAH</b></td>
                            <td><b>${totalStudents}</b></td>
                            <td><b>${totalHadir}</b></td>
                            <td><b>${totalLewat}</b></td>
                            <td><b>${totalHadir}</b></td>
                            <td><b>${overallPercent}%</b></td>
                            </tr>`;
        tbody.innerHTML = html;
        
        const lateTbody = document.getElementById('lateTableBody');
        if (lateTbody) {
            if (lateStudentsArray && lateStudentsArray.length > 0) {
                let lateHtml = '';
                lateStudentsArray.forEach(s => {
                    lateHtml += `<tr>
                                    <td>${s.name || 'N/A'}</td>
                                    <td>${s.className || '-'}</td>
                                    <td>${s.time || '-'}</td>
                                    <td><span style="color:#FF9500;">Lewat</span></td>
                                </tr>`;
                });
                lateTbody.innerHTML = lateHtml;
            } else {
                lateTbody.innerHTML = '<tr><td colspan="4" style="text-align:center;">Tiada murid lewat pada hari ini</td></tr>';
            }
        }
    }

    async function loadDashboardForDate(dateStr) {
        const studentSnap = await getDocs(collection(db, "studentInform"));
        let classMasterData = {};
        studentSnap.forEach(doc => {
            const data = doc.data();
            const className = data.className || "Lain-lain";
            if (className === EXCLUDED_CLASS) return;
            if (!classMasterData[className]) classMasterData[className] = { total: 0, present: 0, late: 0 };
            classMasterData[className].total++;
        });

        const attendSnap = await getDocs(query(collection(db, "attendanceLogs"), where("date", "==", dateStr)));
        let lateStudents = [];
        attendSnap.forEach(doc => {
            const data = doc.data();
            const studentClass = data.className;
            if (studentClass === EXCLUDED_CLASS) return;
            if (classMasterData[studentClass]) {
                let displayTime = "--:--";
                if (data.timeFull && data.timeFull.includes(",")) {
                    const timePart = data.timeFull.split(",")[1].trim();
                    const hm = timePart.split(" ")[0].split(":").slice(0,2).join(":");
                    displayTime = hm + " " + (timePart.split(" ")[1] || "");
                } else displayTime = data.time || "--:--";
                if (data.status === "Lewat") { 
                    classMasterData[studentClass].late++; 
                    lateStudents.push({ name: data.name || "Tidak Dikenali", className: studentClass, time: displayTime }); 
                }
                else if (data.status === "Hadir") classMasterData[studentClass].present++;
            }
        });
        currentClassMasterData = classMasterData;
        updateChartAndTable(classMasterData, lateStudents);
    }
    
    function updateChartAndTable(classData, lateList) {
        renderTable(classData, lateList);
        
        const labels = [];
        const hadirPercentData = [];
        const lewatPercentData = [];
        
        const sortedClasses = Object.keys(classData).sort(sortClasses);
        for (let className of sortedClasses) {
            const item = classData[className] || { total: 0, present: 0, late: 0 };
            const total = item.total;
            const hadirCount = item.present || 0;
            const lateCount = item.late || 0;
            const totalHadir = hadirCount + lateCount;
            
            let hadirPercent = 0, lewatPercent = 0;
            if (total > 0) {
                hadirPercent = (totalHadir / total) * 100;
                lewatPercent = (lateCount / total) * 100;
            }
            labels.push(className);
            hadirPercentData.push(parseFloat(hadirPercent.toFixed(2)));
            lewatPercentData.push(parseFloat(lewatPercent.toFixed(2)));
        }
        
        renderChart(labels, hadirPercentData, lewatPercentData);
    }
    
    let attendanceChart;
    
    function renderChart(labels, hadirData, lewatData) {
        const canvas = document.getElementById('attendanceChart');
        if (!canvas) return;
        const ctx = canvas.getContext('2d');
        if (!ctx) return;
        
        if (attendanceChart) {
            attendanceChart.destroy();
        }
        
        attendanceChart = new Chart(ctx, {
            type: 'bar',
            data: {
                labels: labels,
                datasets: [
                    {
                        label: 'Hadir (%)',
                        data: hadirData,
                        backgroundColor: '#007AFF',
                        borderRadius: 6,
                        barPercentage: 0.7,
                        categoryPercentage: 0.8
                    },
                    {
                        label: 'Lewat (%)',
                        data: lewatData,
                        backgroundColor: '#FF9500',
                        borderRadius: 6,
                        barPercentage: 0.7,
                        categoryPercentage: 0.8
                    }
                ]
            },
            options: {
                responsive: true,
                maintainAspectRatio: true,
                plugins: {
                    tooltip: {
                        callbacks: {
                            label: function(context) {
                                let label = context.dataset.label || '';
                                let val = context.raw;
                                return `${label}: ${val}%`;
                            }
                        }
                    },
                    legend: {
                        position: 'bottom',
                        labels: { font: { size: 12 } }
                    }
                },
                scales: {
                    x: {
                        ticks: {
                            maxRotation: 45,
                            minRotation: 45,
                            autoSkip: true,
                            font: { size: 11 }
                        },
                        title: { display: true, text: 'Kelas', font: { weight: 'bold' } }
                    },
                    y: {
                        beginAtZero: true,
                        max: 100,
                        ticks: {
                            callback: function(value) {
                                return value + '%';
                            },
                            stepSize: 20
                        },
                        title: { display: true, text: 'Peratus (%)', font: { weight: 'bold' } }
                    }
                }
            }
        });
    }
    
    window.loadMonthlyReport = async () => {
        const month = parseInt(document.getElementById('monthPicker').value);
        let year = parseInt(document.getElementById('yearPicker').value);
        if (isNaN(year)) year = new Date().getFullYear();
        const startDate = `${year}-${String(month+1).padStart(2,'0')}-01`;
        const lastDay = new Date(year, month+1, 0).getDate();
        const endDate = `${year}-${String(month+1).padStart(2,'0')}-${lastDay}`;
        const monthNames = ["Januari", "Februari", "Mac", "April", "Mei", "Jun", "Julai", "Ogos", "September", "Oktober", "November", "Disember"];
        const monthDisplay = `${monthNames[month]} ${year}`;
        
        const studentSnap = await getDocs(collection(db, "studentInform"));
        let classTotalMap = {};
        studentSnap.forEach(doc => {
            const data = doc.data();
            if (data.className !== EXCLUDED_CLASS) classTotalMap[data.className] = (classTotalMap[data.className] || 0) + 1;
        });

        const logsSnap = await getDocs(collection(db, "attendanceLogs"));
        let monthlyStats = {};
        logsSnap.forEach(doc => {
            const log = doc.data();
            if (log.date >= startDate && log.date <= endDate && log.className !== EXCLUDED_CLASS) {
                if (!monthlyStats[log.className]) monthlyStats[log.className] = { hadir: 0, lewat: 0 };
                if (log.status === "Hadir") monthlyStats[log.className].hadir++;
                else if (log.status === "Lewat") monthlyStats[log.className].lewat++;
            }
        });

        let html = `<div class="monthly-title">📊 Laporan Bulanan: ${monthDisplay}</div>`;
        html += `<div class="chart-wrapper" style="margin-bottom: 20px;"><div class="chart-inner"><canvas id="monthlyChartCanvas" height="400"></canvas></div></div>`;
        html += `<div style="display: flex; justify-content: center; width: 100%;"><table style="width: 100%; max-width: 1200px; margin: 0 auto;"><thead><tr><th>KELAS</th><th>BIL. MURID</th><th>HADIR</th><th>LEWAT</th><th>JUMLAH HADIR</th><th>%</th></tr></thead><tbody>`;
        
        let totalStudentAll = 0, totalHadirAll = 0, totalLewatAll = 0;
        const labels = [], hadirPercentData = [], lewatPercentData = [];
        const sortedClasses = Object.keys(classTotalMap).sort(sortClasses);
        
        for (let className of sortedClasses) {
            const total = classTotalMap[className];
            const stats = monthlyStats[className] || { hadir: 0, lewat: 0 };
            const totalHadirClass = stats.hadir + stats.lewat;
            const per = total > 0 ? ((totalHadirClass / total) * 100).toFixed(2) : "0.00";
            const hadirPercent = total > 0 ? ((totalHadirClass / total) * 100) : 0;
            const lewatPercent = total > 0 ? ((stats.lewat / total) * 100) : 0;
            
            totalStudentAll += total;
            totalHadirAll += totalHadirClass;
            totalLewatAll += stats.lewat;
            
            labels.push(className);
            hadirPercentData.push(parseFloat(hadirPercent.toFixed(2)));
            lewatPercentData.push(parseFloat(lewatPercent.toFixed(2)));
            
            html += `<tr>
                        <td style="font-weight:500;">${className}</td>
                        <td>${total}</td>
                        <td>${stats.hadir}</td>
                        <td class="lewat-text">${stats.lewat}</td>
                        <td>${totalHadirClass}</td>
                        <td>${per}%</td>
                      </tr>`;
        }
        const overallPer = totalStudentAll > 0 ? ((totalHadirAll / totalStudentAll) * 100).toFixed(2) : "0.00";
        html += `<tr class="summary-row">
                    <td class="total-label"><b>JUMLAH</b></td>
                    <td><b>${totalStudentAll}</b></td>
                    <td><b>${totalHadirAll}</b></td>
                    <td><b>${totalLewatAll}</b></td>
                    <td><b>${totalHadirAll}</b></td>
                    <td><b>${overallPer}%</b></td>
                  </tr>`;
        html += `</tbody></table></div><div class="monthly-stats">📅 ${monthDisplay} | 📊 Purata Kehadiran: ${overallPer}%</div>`;
        
        document.getElementById('monthlyReportContent').innerHTML = html;
        
        const ctx = document.getElementById('monthlyChartCanvas');
        if (ctx) {
            if (window.monthlyChart) window.monthlyChart.destroy();
            const isMany = labels.length > 10;
            window.monthlyChart = new Chart(ctx, {
                type: 'bar',
                data: { 
                    labels: labels, 
                    datasets: [
                        { 
                            label: 'Hadir (%)', 
                            data: hadirPercentData, 
                            backgroundColor: '#007AFF', 
                            borderRadius: 4, 
                            maxBarThickness: isMany ? 25 : 45 
                        },
                        { 
                            label: 'Lewat (%)', 
                            data: lewatPercentData, 
                            backgroundColor: '#FF9500', 
                            borderRadius: 4, 
                            maxBarThickness: isMany ? 25 : 45 
                        }
                    ] 
                },
                options: { 
                    responsive: true, 
                    maintainAspectRatio: true, 
                    aspectRatio: 1.6, 
                    scales: { 
                        x: { 
                            ticks: { font: { size: isMany ? 10 : 12 }, maxRotation: 45, minRotation: 45 } 
                        }, 
                        y: { 
                            beginAtZero: true, 
                            max: 100,
                            ticks: { 
                                stepSize: 20, 
                                callback: function(value) { return value + '%'; }
                            } 
                        } 
                    }, 
                    plugins: { 
                        legend: { position: 'bottom' },
                        tooltip: {
                            callbacks: {
                                label: function(context) {
                                    return `${context.dataset.label}: ${context.raw}%`;
                                }
                            }
                        }
                    } 
                }
            });
        }
        lucide.createIcons();
    };

    async function takeScreenshot(element, fileName) {
        const overlay = document.createElement('div');
        overlay.className = 'screenshot-overlay';
        overlay.innerHTML = '<div class="screenshot-loading"><span>📸</span> Sedang mengambil screenshot...<br><small>Sila tunggu sebentar</small></div>';
        document.body.appendChild(overlay);
        
        try {
            await new Promise(resolve => setTimeout(resolve, 100));
            
            const canvas = await html2canvas(element, {
                scale: 2,
                backgroundColor: '#F2F2F7',
                useCORS: false,
                logging: false,
                allowTaint: true,
                windowWidth: element.scrollWidth,
                windowHeight: element.scrollHeight
            });
            
            const link = document.createElement('a');
            const now = new Date();
            const malaysiaTime = new Date(now.getTime() + (8 * 60 * 60 * 1000));
            const dateStr = `${malaysiaTime.getUTCFullYear()}${String(malaysiaTime.getUTCMonth()+1).padStart(2,'0')}${String(malaysiaTime.getUTCDate()).padStart(2,'0')}`;
            const timeStr = `${String(malaysiaTime.getUTCHours()).padStart(2,'0')}${String(malaysiaTime.getUTCMinutes()).padStart(2,'0')}`;
            link.download = `semsira_${fileName}_${dateStr}_${timeStr}.png`;
            link.href = canvas.toDataURL('image/png');
            link.click();
            
            return true;
        } catch (error) {
            console.error('Screenshot error:', error);
            return false;
        } finally {
            overlay.remove();
        }
    }
    
    async function captureWithHeader(contentElementId, fileName) {
        const headerArea = document.getElementById('mainScreenshotArea');
        const contentArea = document.getElementById(contentElementId);
        
        if (!headerArea || !contentArea) {
            alert('Elemen tidak dijumpai!');
            return;
        }
        
        const headerClone = headerArea.cloneNode(true);
        const contentClone = contentArea.cloneNode(true);
        
        const headerBtns = headerClone.querySelectorAll('.btn-action, .no-print, select');
        headerBtns.forEach(el => el.remove());
        
        const contentBtns = contentClone.querySelectorAll('.btn-action, .section-header button, .no-print, select, .section-header > div');
        contentBtns.forEach(el => el.remove());
        
        const contentHeaders = contentClone.querySelectorAll('.section-header h3');
        contentHeaders.forEach(h => {
            const icon = h.querySelector('i');
            if (icon) icon.remove();
        });
        
        const originalCanvases = contentArea.querySelectorAll('canvas');
        const cloneCanvases = contentClone.querySelectorAll('canvas');
        
        for (let i = 0; i < originalCanvases.length && i < cloneCanvases.length; i++) {
            const origCanvas = originalCanvases[i];
            const cloneCanvas = cloneCanvases[i];
            if (origCanvas && cloneCanvas && origCanvas.width > 0) {
                cloneCanvas.width = origCanvas.width;
                cloneCanvas.height = origCanvas.height;
                const ctx = cloneCanvas.getContext('2d');
                if (ctx) {
                    ctx.drawImage(origCanvas, 0, 0);
                }
            }
        }
        
        const tempContainer = document.createElement('div');
        tempContainer.style.position = 'absolute';
        tempContainer.style.top = '-9999px';
        tempContainer.style.left = '-9999px';
        tempContainer.style.backgroundColor = '#F2F2F7';
        tempContainer.style.padding = '20px';
        tempContainer.style.width = '800px';
        tempContainer.appendChild(headerClone);
        tempContainer.appendChild(contentClone);
        document.body.appendChild(tempContainer);
        
        const success = await takeScreenshot(tempContainer, fileName);
        tempContainer.remove();
        
        if (success) {
            alert('✅ Screenshot berjaya disimpan!');
        } else {
            alert('❌ Screenshot gagal. Sila cuba lagi.');
        }
    }

    window.captureGraphOnly = () => captureWithHeader('graphSection', 'graf_kehadiran');
    window.captureTableSection = () => captureWithHeader('reportSection', 'jadual_ringkasan');
    window.captureLateSection = () => captureWithHeader('lateSection', 'senarai_lewat');
    window.captureMonthlySection = () => captureMonthlyWithHeader();

    window.toggleManualPanel = () => { document.getElementById('manualPanel').style.display = document.getElementById('manualPanel').style.display === 'block' ? 'none' : 'block'; };
    window.addRow = () => {
        const filtered = allStaticClasses.filter(c => c !== EXCLUDED_CLASS);
        const div = document.createElement('div'); div.className = 'input-row';
        div.innerHTML = `<select class="m-class-select">${filtered.map(c => `<option value="${c}">${c}</option>`).join('')}</select><input type="text" placeholder="e.g. 8/10" class="m-data"><button class="btn-action" style="background:#FF3B30;" onclick="removeRow(this)">Padam</button>`;
        document.getElementById('manualInputs').appendChild(div);
    };
    window.removeRow = (btn) => btn.parentElement.remove();
    window.applyManualData = () => {
        const selects = document.querySelectorAll('.m-class-select'), inputs = document.querySelectorAll('.m-data');
        let m = {};
        for(let i=0; i<selects.length; i++){
            if(!inputs[i].value.includes('/')) continue;
            const [h, t] = inputs[i].value.split('/').map(Number);
            if(!isNaN(h) && selects[i].value !== EXCLUDED_CLASS) m[selects[i].value] = { total: t || 0, present: h, late: 0 };
        }
        updateChartAndTable(m, []);
    };
    window.resetToFirebase = () => {
        const today = getMalaysiaDate();
        document.getElementById('datePicker').value = today;
        loadDashboardForDate(today);
    };

    // 初始化 - 使用马来西亚日期
    const todayStr = getMalaysiaDate();
    document.getElementById('datePicker').value = todayStr;
    document.getElementById('yearPicker').value = new Date().getFullYear();
    document.getElementById('monthPicker').value = new Date().getMonth();
    
    const filtered = allStaticClasses.filter(c => c !== EXCLUDED_CLASS);
    document.querySelectorAll('.m-class-select').forEach(s => s.innerHTML = filtered.map(c => `<option value="${c}">${c}</option>`).join(''));
    
    setInterval(updateLiveDateTime, 1000);
    updateLiveDateTime();
    loadDashboardForDate(todayStr);
    loadMonthlyReport();
</script>
