<!DOCTYPE html>
<html lang="ms">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard Kehadiran Semsira</title>
    <link rel="icon" type="image/png" href="/semsira.png">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        :root {
            --primary: #007AFF;
            --lewat: #FF9500;
            --bg: #F2F2F7;
            --card: #FFFFFF;
        }

        body {
            font-family: -apple-system, sans-serif;
            background-color: var(--bg);
            margin: 0;
            padding: 20px;
        }

        .header-container {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 10px;
        }

        .header-logo {
            display: flex;
            align-items: center;
            gap: 15px;
        }

        .header-logo img {
            width: 50px;
            height: 50px;
            border-radius: 10px;
        }

        .date-time-info {
            background: white;
            padding: 10px 15px;
            border-radius: 10px;
            margin-bottom: 20px;
            display: flex;
            justify-content: space-between;
            font-weight: 600;
            color: #1c1c1e;
            box-shadow: 0 2px 5px rgba(0,0,0,0.05);
        }

        .button-group {
            display: flex;
            gap: 10px;
        }

        .btn-print {
            background: var(--primary);
            color: white;
            border: none;
            padding: 10px 20px;
            border-radius: 8px;
            cursor: pointer;
            display: flex;
            align-items: center;
            gap: 8px;
            font-weight: bold;
        }

        .btn-manual {
            background: #5856D6;
            color: white;
            border: none;
            padding: 10px 20px;
            border-radius: 8px;
            cursor: pointer;
            display: flex;
            align-items: center;
            gap: 8px;
            font-weight: bold;
        }

        .dashboard-container {
            background: var(--card);
            padding: 20px;
            border-radius: 15px;
            box-shadow: 0 4px 10px rgba(0,0,0,0.05);
            margin-bottom: 20px;
        }

        /* Manual Input Panel */
        .manual-panel {
            display: none;
            background: #E5E5EA;
            padding: 20px;
            border-radius: 15px;
            margin-bottom: 20px;
        }

        .input-row {
            display: flex;
            gap: 10px;
            margin-bottom: 10px;
            flex-wrap: wrap;
        }

        .input-row select, .input-row input {
            padding: 10px;
            border-radius: 8px;
            border: 1px solid #ccc;
            flex: 1;
            min-width: 150px;
        }

        .page-break-section {
            break-before: page;
            margin-top: 30px;
        }

        canvas { max-width: 100%; margin-bottom: 30px; }

        table {
            width: 100%;
            border-collapse: collapse;
            margin-top: 20px;
            background: white;
        }

        th, td {
            border: 1px solid #ddd;
            padding: 12px;
            text-align: center;
        }

        th { 
            background-color: #D0E1F9 !important; 
            color: #000;
            font-weight: bold; 
            -webkit-print-color-adjust: exact;
        }
        .summary-row { 
            background-color: #FFEB3B !important; 
            font-weight: bold; 
            -webkit-print-color-adjust: exact;
        }
        .total-label {
            background-color: #FF9800 !important;
            color: white !important;
            -webkit-print-color-adjust: exact;
        }

        .lewat-text { color: var(--lewat); font-weight: bold; }

        @media print {
            @page { margin: 1cm; }
            body { padding: 0; background: white; }
            .no-print { display: none !important; }
            .dashboard-container { box-shadow: none; border: 1px solid #eee; }
            table { font-size: 11px; width: 100%; }
            th, .summary-row, .total-label {
                -webkit-print-color-adjust: exact;
                print-color-adjust: exact;
            }
        }
    </style>
</head>
<body>

<div class="header-container">
    <div class="header-logo">
        <img src="/semsira.png" alt="Logo Semsira">
        <h2>Analisis Kehadiran Murid (Harian)</h2>
    </div>
    <div class="button-group no-print">
        <button class="btn-manual" onclick="toggleManualPanel()">
            <i data-lucide="edit-3"></i> Input Manual
        </button>
        <button class="btn-print" onclick="window.print()">
            <i data-lucide="printer"></i> Cetak Laporan
        </button>
    </div>
</div>

<div class="date-time-info">
    <span id="current-date">Tarikh: --/--/----</span>
    <span id="current-time">Masa: --:--:--</span>
</div>

<div id="manualPanel" class="manual-panel no-print">
    <h3>Input Data Manual</h3>
    <p style="font-size: 0.9em; color: #666;">Pilih kelas dan masukkan kehadiran (Contoh: 8/10)</p>
    <div id="manualInputs">
        <div class="input-row">
            <select class="m-class-select">
                <option value="">Memuatkan kelas...</option>
            </select>
            <input type="text" placeholder="Kehadiran (e.g. 8/10)" class="m-data">
            <button class="btn-print" style="background:#FF3B30;" onclick="removeRow(this)">Padam</button>
        </div>
    </div>
    <div style="margin-top:15px; display:flex; gap:10px;">
        <button class="btn-print" style="background:#34C759;" onclick="addRow()">+ Tambah Baris</button>
        <button class="btn-print" onclick="applyManualData()">Jana Laporan</button>
        <button class="btn-print" style="background:#8E8E93;" onclick="loadDashboard()">Reset ke Data Firebase</button>
    </div>
</div>

<div class="dashboard-container">
    <canvas id="attendanceChart" height="100"></canvas>

    <table id="attendanceTable">
        <thead>
            <tr>
                <th>KELAS</th>
                <th>BIL. MURID</th>
                <th>HADIR (TEPAT)</th>
                <th>LEWAT</th>
                <th>JUMLAH HADIR</th>
                <th>% KEHADIRAN</th>
            </tr>
        </thead>
        <tbody id="tableBody"></tbody>
        <tfoot>
            <tr id="totalRow" class="summary-row"></tr>
        </tfoot>
    </table>
</div>

<div class="dashboard-container page-break-section">
    <h3 style="display:flex; align-items:center; gap:10px; color: var(--lewat);">
        <i data-lucide="user-x"></i> Senarai Murid Lewat Hari Ini
    </h3>
    <table id="lateStudentsTable">
        <thead>
            <tr>
                <th>NAMA MURID</th>
                <th>KELAS</th>
                <th>WAKTU MASUK</th>
                <th>STATUS</th>
            </tr>
        </thead>
        <tbody id="lateTableBody">
            <tr><td colspan="4">Memuatkan data...</td></tr>
        </tbody>
    </table>
</div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
    import { getFirestore, collection, getDocs, query, where } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

    const firebaseConfig = {
        apiKey: "AIzaSyCqY9ADs8oy1Uvh3-7eVCQLYfyTijm8lo4",
        authDomain: "bdpsemsira-5c274.firebaseapp.com",
        projectId: "bdpsemsira-5c274",
        storageBucket: "bdpsemsira-5c274.firebasestorage.app",
        messagingSenderId: "176946808975",
        appId: "1:176946808975:web:ef7447a11bb57fe71b88fa"
    };

    const app = initializeApp(firebaseConfig);
    const db = getFirestore(app);

    window.myChart = null;
    let existingClasses = [];

    // Panel controls
    window.toggleManualPanel = () => {
        const p = document.getElementById('manualPanel');
        p.style.display = p.style.display === 'block' ? 'none' : 'block';
    };

    window.addRow = () => {
        const div = document.createElement('div');
        div.className = 'input-row';
        div.innerHTML = `
            <select class="m-class-select">
                ${existingClasses.map(c => `<option value="${c}">${c}</option>`).join('')}
            </select>
            <input type="text" placeholder="Kehadiran (e.g. 8/10)" class="m-data">
            <button class="btn-print" style="background:#FF3B30;" onclick="removeRow(this)">Padam</button>
        `;
        document.getElementById('manualInputs').appendChild(div);
    };

    window.removeRow = (btn) => btn.parentElement.remove();

    window.applyManualData = () => {
        const selects = document.getElementsByClassName('m-class-select');
        const datas = document.getElementsByClassName('m-data');
        let manualClassMaster = {};

        for(let i=0; i<selects.length; i++) {
            const name = selects[i].value;
            const val = datas[i].value.trim();
            if(name && val.includes('/')) {
                const [h, t] = val.split('/').map(Number);
                if(!isNaN(h) && !isNaN(t)) {
                    manualClassMaster[name] = { total: t, present: h, late: 0 };
                }
            }
        }

        if(Object.keys(manualClassMaster).length > 0) {
            updateUI(manualClassMaster, []); 
        } else {
            alert("Sila pilih kelas和输入正确的格式 (e.g. 8/10)");
        }
    };

    function updateLiveDateTime() {
        const now = new Date();
        document.getElementById('current-date').innerText = "Tarikh: " + now.toLocaleDateString('ms-MY');
        document.getElementById('current-time').innerText = "Masa: " + now.toLocaleTimeString('ms-MY');
    }
    setInterval(updateLiveDateTime, 1000);
    updateLiveDateTime();

    async function loadDashboard() {
        const studentSnap = await getDocs(collection(db, "studentInform"));
        let classMasterData = {}; 

        studentSnap.forEach(doc => {
            const data = doc.data();
            const className = data.className || "Lain-lain";
            if (!classMasterData[className]) {
                classMasterData[className] = { total: 0, present: 0, late: 0 };
            }
            classMasterData[className].total++;
        });

        // 保存现有班级列表用于下拉菜单
        existingClasses = Object.keys(classMasterData).sort();
        updateSelectOptions();

        const today = new Date();
        const todayStr = `${today.getFullYear()}-${String(today.getMonth() + 1).padStart(2, '0')}-${String(today.getDate()).padStart(2, '0')}`;

        const attendQuery = query(collection(db, "attendanceLogs"), where("date", "==", todayStr));
        const attendSnap = await getDocs(attendQuery);
        
        let lateStudents = [];
        attendSnap.forEach(doc => {
            const data = doc.data();
            if (classMasterData[data.className]) {
                if (data.status === "Lewat") {
                    classMasterData[data.className].late++;
                    lateStudents.push(data);
                } else {
                    classMasterData[data.className].present++;
                }
            }
        });

        updateUI(classMasterData, lateStudents);
    }

    function updateSelectOptions() {
        const selects = document.getElementsByClassName('m-class-select');
        const options = existingClasses.map(c => `<option value="${c}">${c}</option>`).join('');
        for(let sel of selects) {
            sel.innerHTML = options;
        }
    }

    function updateUI(data, lateStudents) {
        const tableBody = document.getElementById('tableBody');
        const totalRow = document.getElementById('totalRow');
        const lateTableBody = document.getElementById('lateTableBody');
        
        let labels = [];
        let dataPresent = [];
        let dataLate = [];
        let grandTotalMurid = 0;
        let grandTotalHadir = 0;
        let grandTotalLewat = 0;

        tableBody.innerHTML = "";
        const sortedClasses = Object.keys(data).sort();

        sortedClasses.forEach(className => {
            const item = data[className];
            const totalHadirKelas = item.present + item.late;
            const percent = item.total > 0 ? ((totalHadirKelas / item.total) * 100).toFixed(2) : "0.00";
            
            grandTotalMurid += item.total;
            grandTotalHadir += item.present;
            grandTotalLewat += item.late;

            labels.push(className);
            dataPresent.push(item.present);
            dataLate.push(item.late);

            tableBody.innerHTML += `
                <tr>
                    <td>${className}</td>
                    <td>${item.total}</td>
                    <td>${item.present}</td>
                    <td class="lewat-text">${item.late}</td>
                    <td>${totalHadirKelas}</td>
                    <td>${percent}%</td>
                </tr>
            `;
        });

        const totalAllHadir = grandTotalHadir + grandTotalLewat;
        const grandPercent = grandTotalMurid > 0 ? ((totalAllHadir / grandTotalMurid) * 100).toFixed(2) : "0.00";
        
        totalRow.innerHTML = `
            <td class="total-label">JUMLAH KESELURUHAN</td>
            <td>${grandTotalMurid}</td>
            <td>${grandTotalHadir}</td>
            <td>${grandTotalLewat}</td>
            <td>${totalAllHadir}</td>
            <td>${grandPercent}%</td>
        `;

        if (lateStudents.length > 0) {
            lateTableBody.innerHTML = lateStudents.map(s => {
                let displayTime = "--:--";
                if (s.timeFull && typeof s.timeFull === 'string') {
                    const parts = s.timeFull.split(',');
                    displayTime = parts.length > 1 ? parts[1].trim() : s.timeFull;
                } else if (s.time) displayTime = s.time;

                return `
                    <tr>
                        <td style="text-align:left;">${s.name}</td>
                        <td>${s.className}</td>
                        <td>${displayTime}</td>
                        <td class="lewat-text">LEWAT</td>
                    </tr>
                `;
            }).join('');
        } else {
            lateTableBody.innerHTML = `<tr><td colspan="4">Tiada rekod murid lewat / Mode Manual Aktif.</td></tr>`;
        }

        renderChart(labels, dataPresent, dataLate);
        lucide.createIcons();
    }

    function renderChart(labels, presentData, lateData) {
        const ctx = document.getElementById('attendanceChart').getContext('2d');
        if(window.myChart) window.myChart.destroy();
        
        window.myChart = new Chart(ctx, {
            type: 'bar',
            data: {
                labels: labels,
                datasets: [
                    { label: 'Hadir (Tepat)', data: presentData, backgroundColor: '#007AFF', borderRadius: 5 },
                    { label: 'Lewat', data: lateData, backgroundColor: '#FF9500', borderRadius: 5 }
                ]
            },
            options: {
                responsive: true,
                scales: {
                    x: { stacked: true },
                    y: { beginAtZero: true, stacked: true, title: { display: true, text: 'Bilangan Murid' } }
                }
            }
        });
    }

    window.loadDashboard = loadDashboard;
    loadDashboard();
</script>
</body>
</html>
