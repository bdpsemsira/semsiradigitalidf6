<!DOCTYPE html>
<html lang="ms">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pengurusan Pelajar Semsira</title>
    <link rel="icon" type="image/png" href="semsira.png">

    <script>
        (function() {
            const isAuth = localStorage.getItem('semsira_auth') === 'true' || 
                           sessionStorage.getItem('semsira_auth') === 'true';
            if (!isAuth) {
                alert('Akses tidak dibenarkan. Sila log masuk.');
                window.location.href = 'firebase_admin.html';
            }
        })();
    </script>

    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        :root {
            --primary: #007AFF;
            --danger: #FF3B30;
            --bg: #F2F2F7;
            --card: #FFFFFF;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, sans-serif;
            background-color: var(--bg);
            margin: 0;
            padding: 20px;
            color: #1c1c1e;
        }

        .container {
            max-width: 900px;
            margin: 0 auto;
        }

        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 30px;
        }

        .header-left {
            display: flex;
            align-items: center;
            gap: 15px;
        }

        .header img {
            width: 50px; height: 50px; border-radius: 12px;
        }

        .total-badge {
            background: var(--primary);
            color: white;
            padding: 5px 15px;
            border-radius: 20px;
            font-size: 14px;
            font-weight: bold;
        }

        .semester-section { margin-bottom: 20px; }

        .section-title {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 12px 15px;
            background: var(--card);
            border-radius: 12px;
            cursor: pointer;
            box-shadow: 0 2px 5px rgba(0,0,0,0.05);
            transition: background 0.3s;
        }

        .section-title:hover { background: #f9f9fb; }

        .title-left {
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .chevron-icon {
            transition: transform 0.3s;
            color: var(--primary);
        }

        .collapsed .chevron-icon { transform: rotate(-90deg); }

        .collapsible-content { padding-top: 15px; display: block; }

        .collapsed + .collapsible-content { display: none; }

        .count-tag {
            background: #E5E5EA;
            color: #3a3a3c;
            padding: 2px 10px;
            border-radius: 10px;
            font-size: 13px;
        }

        .btn-delete-all {
            background: var(--danger);
            color: white; border: none;
            padding: 8px 12px; border-radius: 8px;
            font-size: 11px; font-weight: bold;
            cursor: pointer; display: flex; align-items: center; gap: 5px;
        }

        .student-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
            gap: 15px;
        }

        .student-card {
            background: var(--card);
            border-radius: 15px;
            padding: 15px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.05);
            position: relative;
        }

        .student-info h4 { margin: 0 0 5px 0; font-size: 16px; padding-right: 30px;}
        .student-info p { margin: 2px 0; font-size: 13px; color: #8e8e93; }

        .btn-delete-single {
            position: absolute; top: 15px; right: 15px;
            color: #C7C7CC; border: none; background: none; cursor: pointer;
        }
        .btn-delete-single:hover { color: var(--danger); }

        .loading { text-align: center; padding: 50px; color: #8e8e93; }
        
        .back-btn { margin-bottom: 20px; display: inline-flex; align-items: center; gap: 5px; color: var(--primary); text-decoration: none; font-size: 14px; font-weight: 600; }
    </style>
</head>
<body>

<div class="container" id="main-content">
    <a href="firebase_admin.html" class="back-btn"><i data-lucide="chevron-left"></i> Kembali ke Menu</a>
    
    <div class="header">
        <div class="header-left">
            <img src="semsira.png" alt="Logo">
            <div>
                <h1 style="margin:0; font-size: 20px;">Pengurusan Pelajar</h1>
                <p style="margin:0; color: #8e8e93; font-size: 12px;">Sistem Pengurusan Semsira</p>
            </div>
        </div>
        <div class="total-badge">Total: <span id="overall-count">0</span></div>
    </div>

    <div id="loading" class="loading">Memuatkan data...</div>

    <div class="semester-section" id="section-sem1" style="display:none;">
        <div class="section-title" onclick="toggleSection('section-sem1')">
            <div class="title-left">
                <i data-lucide="chevron-down" class="chevron-icon"></i>
                <h2 style="margin:0; font-size:17px;">Semester 1</h2>
                <span class="count-tag" id="count-sem1">0</span>
            </div>
            <button class="btn-delete-all" onclick="event.stopPropagation(); deleteWholeSemester('1')">
                <i data-lucide="trash-2"></i> Padam Semua
            </button>
        </div>
        <div class="collapsible-content">
            <div class="student-grid" id="grid-sem1"></div>
        </div>
    </div>

    <div class="semester-section" id="section-sem2" style="display:none;">
        <div class="section-title collapsed" onclick="toggleSection('section-sem2')">
            <div class="title-left">
                <i data-lucide="chevron-down" class="chevron-icon"></i>
                <h2 style="margin:0; font-size:17px;">Semester 2</h2>
                <span class="count-tag" id="count-sem2">0</span>
            </div>
            <button class="btn-delete-all" onclick="event.stopPropagation(); deleteWholeSemester('2')">
                <i data-lucide="trash-2"></i> Padam Semua
            </button>
        </div>
        <div class="collapsible-content">
            <div class="student-grid" id="grid-sem2"></div>
        </div>
    </div>
</div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
    import { getFirestore, collection, getDocs, deleteDoc, doc, query, where, writeBatch } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

    const firebaseConfig = {
        apiKey: "AIzaSyCqY9ADs8oy1Uvh3-7eVCQLYfyTijm8lo4",
        authDomain: "bdpsemsira-5c274.firebaseapp.com",
        projectId: "bdpsemsira-5c274",
        storageBucket: "bdpsemsira-5c274.firebasestorage.app",
        messagingSenderId: "176946808975",
        appId: "1:176946808975:web:ef7447a11bb57fe71b88fa"
    };

    const app = initializeApp(firebaseConfig);
    const db = getFirestore(app);

    window.toggleSection = (id) => {
        const titleElement = document.querySelector(`#${id} .section-title`);
        titleElement.classList.toggle('collapsed');
    };

    async function loadStudents() {
        const grid1 = document.getElementById('grid-sem1');
        const grid2 = document.getElementById('grid-sem2');
        grid1.innerHTML = ""; grid2.innerHTML = "";
        let c1 = 0, c2 = 0;

        try {
            const querySnapshot = await getDocs(collection(db, "studentInform"));
            document.getElementById('loading').style.display = "none";
            document.getElementById('section-sem1').style.display = "block";
            document.getElementById('section-sem2').style.display = "block";

            querySnapshot.forEach((document) => {
                const data = document.data();
                const id = document.id;
                const card = `
                    <div class="student-card" id="card-${id}">
                        <button class="btn-delete-single" onclick="deleteStudent('${id}', '${data.name}')">
                            <i data-lucide="x-circle"></i>
                        </button>
                        <div class="student-info">
                            <h4>${data.name}</h4>
                            <p><strong>ID:</strong> ${data.studentId}</p>
                            <p><strong>Kelas:</strong> ${data.className}</p>
                            <p><strong>Phone:</strong> ${data.phone}</p>
                        </div>
                    </div>
                `;
                if (data.semester === "1") { grid1.innerHTML += card; c1++; } 
                else { grid2.innerHTML += card; c2++; }
            });

            document.getElementById('count-sem1').innerText = c1;
            document.getElementById('count-sem2').innerText = c2;
            document.getElementById('overall-count').innerText = c1 + c2;
            lucide.createIcons();
        } catch (error) { console.error(error); }
    }

    window.deleteStudent = async (docId, name) => {
        if (confirm(`Padam data ${name}?`)) {
            await deleteDoc(doc(db, "studentInform", docId));
            loadStudents();
        }
    };

    window.deleteWholeSemester = async (sem) => {
        if (confirm(`Padam SEMUA pelajar Semester ${sem}?`)) {
            const q = query(collection(db, "studentInform"), where("semester", "==", sem));
            const snapshot = await getDocs(q);
            const batch = writeBatch(db);
            snapshot.forEach(d => batch.delete(d.ref));
            await batch.commit();
            loadStudents();
        }
    };

    // 页面进入后直接加载数据
    loadStudents();
    lucide.createIcons();
</script>
</body>
</html>
