<!DOCTYPE html>
<html lang="ms">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Semsira Admin Panel</title>
    <link rel="icon" href="semsira.png" type="image/png">
    <style>
        :root {
            --primary: #007AFF;
            --bg: #F2F2F7;
            --card: rgba(255, 255, 255, 0.85);
            --border: rgba(0, 0, 0, 0.1);
        }
        
        body { 
            font-family: -apple-system, BlinkMacSystemFont, sans-serif; 
            background: var(--bg); padding: 20px; margin: 0; 
            -webkit-font-smoothing: antialiased;
        }
        
        .glass {
            background: var(--card);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border-radius: 18px; padding: 20px;
            border: 1px solid var(--border); margin-bottom: 20px;
            box-shadow: 0 4px 20px rgba(0,0,0,0.05);
        }

        .logo-section { display: flex; align-items: center; gap: 15px; margin-bottom: 20px; }
        .logo-img { width: 50px; height: 50px; border-radius: 12px; object-fit: cover; box-shadow: 0 4px 10px rgba(0,0,0,0.1); }

        .segmented-control {
            display: flex; background: rgba(118, 118, 128, 0.12);
            border-radius: 9px; padding: 2px; margin: 15px 0;
        }
        .segmented-control input { display: none; }
        .segmented-control label {
            flex: 1; text-align: center; padding: 8px; font-size: 14px;
            font-weight: 500; cursor: pointer; border-radius: 7px; transition: 0.2s;
        }
        .segmented-control input:checked + label {
            background: white; box-shadow: 0 3px 8px rgba(0,0,0,0.12); color: var(--primary);
        }

        input[type="text"], input[type="password"], textarea {
            width: 100%; padding: 14px; margin: 10px 0;
            border-radius: 12px; border: 1px solid var(--border);
            background: rgba(255,255,255,0.6); font-size: 16px; box-sizing: border-box;
            outline: none;
        }

        button {
            width: 100%; padding: 16px; border-radius: 14px;
            background: var(--primary); color: white; border: none;
            font-weight: 600; font-size: 17px; margin-top: 10px; cursor: pointer;
        }
        
        .secondary-btn {
            background: none; color: #8E8E93; font-size: 12px;
            padding: 10px; margin-top: 5px; width: auto; font-weight: 400;
        }

        .issue-item {
            display: flex; justify-content: space-between; align-items: center;
            padding: 14px 0; border-bottom: 1px solid rgba(0,0,0,0.05);
        }
        .tag { font-size: 10px; padding: 2px 8px; border-radius: 5px; font-weight: 700; text-transform: uppercase; }
        .tag-post { background: #E3F2FD; color: #1976D2; }
        .tag-poster { background: #FFF3E0; color: #F57C00; }

        .del-btn { background: #FF3B30; width: auto; padding: 6px 14px; font-size: 12px; border-radius: 8px; }

        #toast {
            position: fixed; top: 40px; left: 50%; transform: translateX(-50%);
            background: rgba(0,0,0,0.85); color: white; padding: 12px 24px;
            border-radius: 30px; display: none; z-index: 100; font-size: 14px;
        }
    </style>
</head>
<body>

<div id="toast">Memproses...</div>

<div id="token-view" class="glass" style="display:none;">
    <h3 style="margin-top:0">🔑 Semsira Access Setup</h3>
    <p style="font-size:13px; color:#666;">Sila masukkan GitHub Personal Access Token untuk mengurus Issues.</p>
    <input type="password" id="input-token" placeholder="github_pat_...">
    <button onclick="saveToken()">Simpan & Masuk</button>
    <p style="font-size:11px; color: #999; margin-top: 10px;">Token disimpan secara lokal pada pelayar ini sahaja.</p>
</div>

<div id="main-view" style="display:none;">
    <div class="glass">
        <div class="logo-section">
            <img src="semsira.png" alt="Semsira" class="logo-img" onerror="this.src='https://ui-avatars.com/api/?name=S&background=007AFF&color=fff'">
            <div>
                <h2 style="margin:0; font-size: 22px;">Semsira Editor</h2>
                <p style="margin:2px 0 0 0; color: #8E8E93; font-size: 13px;">Panel Kawalan Issues</p>
            </div>
        </div>

        <div class="segmented-control">
            <input type="radio" id="type-post" name="labelType" value="post" checked>
            <label for="type-post">📢 Post (Berita)</label>
            <input type="radio" id="type-poster" name="labelType" value="poster">
            <label for="type-poster">🖼️ Poster (Slider)</label>
        </div>

        <input type="text" id="title" placeholder="Tajuk Ringkas">
        <textarea id="body" rows="5" placeholder="Kandungan teks atau URL gambar..."></textarea>
        
        <button onclick="publish()">Terbitkan Ke Website</button>
        <center><button class="secondary-btn" onclick="clearToken()">Tukar Token GitHub</button></center>
    </div>

    <div class="glass">
        <h3 style="margin: 0 0 15px 0; font-size: 18px;">Kandungan Aktif</h3>
        <div id="list">Memuatkan senarai...</div>
    </div>
</div>

<script>
    const REPO = "bdpsemsira/bdpsemsira.github.io";
    let AUTH_TOKEN = localStorage.getItem('gh_admin_token');

    window.onload = () => {
        if (!AUTH_TOKEN) {
            document.getElementById('token-view').style.display = 'block';
        } else {
            document.getElementById('main-view').style.display = 'block';
            fetchIssues();
        }
    };

    function saveToken() {
        const t = document.getElementById('input-token').value.trim();
        if (t.startsWith('github_pat_')) {
            localStorage.setItem('gh_admin_token', t);
            location.reload();
        } else {
            alert("Format Token salah! Pastikan ia bermula dengan 'github_pat_'.");
        }
    }

    function clearToken() {
        if(confirm("Padam token sedia ada?")) {
            localStorage.removeItem('gh_admin_token');
            location.reload();
        }
    }

    function showToast(m) {
        const el = document.getElementById('toast');
        el.innerText = m; el.style.display = 'block';
        setTimeout(() => el.style.display = 'none', 2500);
    }

    async function publish() {
        const t = document.getElementById('title').value;
        const b = document.getElementById('body').value;
        const l = document.querySelector('input[name="labelType"]:checked').value;

        if(!t || !b) return alert("Sila isi tajuk dan kandungan!");

        showToast("Sedang menerbitkan...");

        try {
            const response = await fetch(`https://api.github.com/repos/${REPO}/issues`, {
                method: 'POST',
                headers: {
                    'Authorization': `token ${AUTH_TOKEN}`,
                    'Accept': 'application/vnd.github.v3+json',
                    'Content-Type': 'application/json'
                },
                // 关键点：确保发送的是数组格式的 labels
                body: JSON.stringify({
                    title: t,
                    body: b,
                    labels: [l] 
                })
            });

            if (response.ok) {
                showToast("✅ Berjaya!");
                document.getElementById('title').value = "";
                document.getElementById('body').value = "";
                fetchIssues();
            } else {
                const errData = await response.json();
                alert("Gagal: " + (errData.message || "Token tidak sah"));
            }
        } catch (e) {
            alert("Ralat rangkaian.");
        }
    }

    async function fetchIssues() {
        const listDiv = document.getElementById('list');
        try {
            const res = await fetch(`https://api.github.com/repos/${REPO}/issues?state=open&t=${Date.now()}`);
            const data = await res.json();
            
            if (!Array.isArray(data)) {
                listDiv.innerHTML = "Sila semak Token anda.";
                return;
            }

            listDiv.innerHTML = data.map(i => {
                const labelName = i.labels[0] ? i.labels[0].name : 'no label';
                return `
                <div class="issue-item">
                    <div>
                        <div class="issue-title">${i.title}</div>
                        <span class="tag tag-${labelName}">${labelName}</span>
                    </div>
                    <button class="del-btn" onclick="removeIssue(${i.number})">Padam</button>
                </div>
                `;
            }).join('');
        } catch(e) {
            listDiv.innerHTML = "Ralat memuatkan senarai.";
        }
    }

    async function removeIssue(num) {
        if(!confirm("Padam makluman ini?")) return;
        showToast("Sedang memadam...");
        try {
            const res = await fetch(`https://api.github.com/repos/${REPO}/issues/${num}`, {
                method: 'PATCH',
                headers: {
                    'Authorization': `token ${AUTH_TOKEN}`,
                    'Accept': 'application/vnd.github.v3+json',
                    'Content-Type': 'application/json'
                },
                body: JSON.stringify({ state: 'closed' })
            });
            if(res.ok) fetchIssues();
        } catch(e) { alert("Gagal memadam."); }
    }
</script>
</body>
</html>
