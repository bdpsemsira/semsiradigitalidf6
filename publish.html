<!DOCTYPE html>
<html lang="ms">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Semsira Admin Panel</title>
    <link rel="icon" href="semsira.png" type="image/png">
    <link rel="apple-touch-icon" href="semsira.png">
    <style>
        :root {
            --primary: #007AFF;
            --bg: #F2F2F7;
            --card: rgba(255, 255, 255, 0.85);
            --border: rgba(0, 0, 0, 0.1);
        }
        
        body { 
            font-family: -apple-system, BlinkMacSystemFont, sans-serif; 
            background: var(--bg); padding: 20px; margin: 0; 
            -webkit-font-smoothing: antialiased;
        }
        
        .glass {
            background: var(--card);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border-radius: 18px; padding: 20px;
            border: 1px solid var(--border); margin-bottom: 20px;
            box-shadow: 0 4px 20px rgba(0,0,0,0.05);
        }

        .logo-section { display: flex; align-items: center; gap: 15px; margin-bottom: 20px; }
        .logo-img { width: 50px; height: 50px; border-radius: 12px; object-fit: cover; }

        .segmented-control {
            display: flex; background: rgba(118, 118, 128, 0.12);
            border-radius: 9px; padding: 2px; margin: 15px 0;
        }
        .segmented-control input { display: none; }
        .segmented-control label {
            flex: 1; text-align: center; padding: 8px; font-size: 14px;
            font-weight: 500; cursor: pointer; border-radius: 7px; transition: 0.2s;
        }
        .segmented-control input:checked + label {
            background: white; box-shadow: 0 3px 8px rgba(0,0,0,0.12); color: var(--primary);
        }

        input[type="text"], input[type="password"], textarea {
            width: 100%; padding: 14px; margin: 10px 0;
            border-radius: 12px; border: 1px solid var(--border);
            background: rgba(255,255,255,0.6); font-size: 16px; box-sizing: border-box;
            outline: none;
        }

        button {
            width: 100%; padding: 16px; border-radius: 14px;
            background: var(--primary); color: white; border: none;
            font-weight: 600; font-size: 17px; margin-top: 10px; cursor: pointer;
        }
        
        button:disabled { background: #ccc; cursor: not-allowed; }

        /* 新增上传图片按钮样式 */
        .upload-area {
            background: rgba(0, 122, 255, 0.1);
            border: 1px dashed var(--primary);
            border-radius: 12px; padding: 12px;
            text-align: center; color: var(--primary);
            font-size: 14px; font-weight: 500; cursor: pointer;
            margin-bottom: 10px;
        }

        .issue-item {
            display: flex; justify-content: space-between; align-items: center;
            padding: 14px 0; border-bottom: 1px solid rgba(0,0,0,0.05);
        }
        .tag { font-size: 10px; padding: 2px 8px; border-radius: 5px; font-weight: 700; text-transform: uppercase; }
        .tag-post { background: #E3F2FD; color: #1976D2; }
        .tag-poster { background: #FFF3E0; color: #F57C00; }
        .tag-close { background: #EBEBEB; color: #8E8E93; }
        .tag-none { background: #EEEEEE; color: #999; }

        .del-btn { background: #FF3B30; width: auto; padding: 6px 14px; font-size: 12px; border-radius: 8px; }

        #toast {
            position: fixed; top: 40px; left: 50%; transform: translateX(-50%);
            background: rgba(0,0,0,0.85); color: white; padding: 12px 24px;
            border-radius: 30px; display: none; z-index: 100; font-size: 14px;
        }
    </style>
</head>
<body>

<div id="toast">Memproses...</div>

<div id="token-view" class="glass" style="display:none;">
    <h3 style="margin-top:0">🔑 Semsira Access</h3>
    <p style="font-size:13px; color:#666;">Masukkan Token GitHub dengan izin 'repo'.</p>
    <input type="password" id="input-token" placeholder="github_pat_...">
    <button onclick="saveToken()">Simpan & Masuk</button>
</div>

<div id="main-view" style="display:none;">
    <div class="glass">
        <div class="logo-section">
            <img src="semsira.png" alt="Semsira" class="logo-img" onerror="this.src='https://ui-avatars.com/api/?name=S&background=007AFF&color=fff'">
            <div>
                <h2 style="margin:0; font-size: 22px;">Semsira Editor</h2>
                <p style="margin:2px 0 0 0; color: #8E8E93; font-size: 13px;">Panel Kawalan Label</p>
            </div>
        </div>

        <div class="segmented-control">
            <input type="radio" id="type-post" name="labelType" value="post" checked>
            <label for="type-post">📢 Post</label>
            <input type="radio" id="type-poster" name="labelType" value="poster">
            <label for="type-poster">🖼️ Poster</label>
        </div>

        <div class="upload-area" onclick="document.getElementById('fileInput').click()">
            📷 Muat Naik Gambar (Auto Link)
        </div>
        <input type="file" id="fileInput" accept="image/*" style="display:none" onchange="uploadImage(this)">

        <input type="text" id="title" placeholder="Tajuk">
        <textarea id="body" rows="6" placeholder="Kandungan..."></textarea>
        
        <button id="btn-pub" onclick="publish()">Terbitkan Sekarang</button>
        <center><button class="secondary-btn" style="background:none; border:none; color:#8E8E93; margin-top:15px; cursor:pointer;" onclick="clearToken()">Log Keluar / Tukar Token</button></center>
    </div>

    <div class="glass">
        <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:15px;">
            <h3 style="margin:0; font-size: 18px;">Senarai Terkini</h3>
            <button onclick="fetchIssues()" style="width:auto; padding:6px 12px; font-size:12px; background:#8E8E93">Segarkan</button>
        </div>
        <div id="list">Memuatkan...</div>
    </div>
</div>

<script>
    const REPO = "bdpsemsira/bdpsemsira.github.io";
    let AUTH_TOKEN = localStorage.getItem('gh_admin_token');

    window.onload = () => {
        if (!AUTH_TOKEN) {
            document.getElementById('token-view').style.display = 'block';
        } else {
            document.getElementById('main-view').style.display = 'block';
            fetchIssues();
        }
    };

    function saveToken() {
        const t = document.getElementById('input-token').value.trim();
        if (t.length > 10) {
            localStorage.setItem('gh_admin_token', t);
            location.reload();
        }
    }

    function clearToken() {
        if(confirm("Padam token?")) {
            localStorage.removeItem('gh_admin_token');
            location.reload();
        }
    }

    function showToast(m) {
        const el = document.getElementById('toast');
        el.innerText = m; el.style.display = 'block';
        setTimeout(() => el.style.display = 'none', 3000);
    }

    // --- 新增：图片上传功能 ---
    async function uploadImage(input) {
        if (!input.files || !input.files[0]) return;
        
        const file = input.files[0];
        const fileName = `img_${Date.now()}_${file.name.replace(/\s+/g, '_')}`;
        const path = `images/${fileName}`; // 图片将保存在仓库的 images 文件夹下
        
        showToast("Sedang memuat naik gambar...");

        const reader = new FileReader();
        reader.onload = async (e) => {
            const content = e.target.result.split(',')[1]; // 获取 Base64 编码
            
            try {
                const res = await fetch(`https://api.github.com/repos/${REPO}/contents/${path}`, {
                    method: 'PUT',
                    headers: {
                        'Authorization': `token ${AUTH_TOKEN}`,
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify({
                        message: `Upload image: ${fileName}`,
                        content: content
                    })
                });

                if (res.ok) {
                    const data = await res.json();
                    // 构造图片直连链接 (GitHub Pages 路径)
                    const imageUrl = `https://raw.githubusercontent.com/${REPO}/master/${path}`;
                    
                    // 将图片 Markdown 插入到文本框
                    const bodyEl = document.getElementById('body');
                    bodyEl.value += `\n\n![image](${imageUrl})`;
                    showToast("✅ Gambar berjaya dimasukkan!");
                } else {
                    alert("Gagal memuat naik gambar. Pastikan folder 'images' wujud atau Token sah.");
                }
            } catch (err) {
                alert("Ralat sambungan untuk muat naik.");
            }
        };
        reader.readAsDataURL(file);
    }

    async function publish() {
        const t = document.getElementById('title').value;
        const b = document.getElementById('body').value;
        const l = document.querySelector('input[name="labelType"]:checked').value;
        const btn = document.getElementById('btn-pub');

        if(!t || !b) return alert("Sila lengkapkan borang!");

        btn.disabled = true;
        showToast("Menghantar...");

        try {
            const res = await fetch(`https://api.github.com/repos/${REPO}/issues`, {
                method: 'POST',
                headers: {
                    'Authorization': `token ${AUTH_TOKEN}`,
                    'Accept': 'application/vnd.github+json',
                    'Content-Type': 'application/json'
                },
                body: JSON.stringify({ title: t, body: b, labels: [l] })
            });

            if (res.ok) {
                showToast("✅ Berjaya!");
                document.getElementById('title').value = "";
                document.getElementById('body').value = "";
                setTimeout(fetchIssues, 1000);
            } else {
                const err = await res.json();
                alert("Gagal: " + err.message);
            }
        } catch (e) {
            alert("Ralat sambungan.");
        } finally {
            btn.disabled = false;
        }
    }

    async function fetchIssues() {
        const listDiv = document.getElementById('list');
        try {
            const res = await fetch(`https://api.github.com/repos/${REPO}/issues?state=open&t=${Date.now()}`, {
                headers: { 'Authorization': `token ${AUTH_TOKEN}` }
            });
            const data = await res.json();
            if (!Array.isArray(data)) return;

            const activeIssues = data.filter(i => !i.labels.some(l => l.name === 'close'));

            if (activeIssues.length === 0) {
                listDiv.innerHTML = "<center style='color:#999; padding:20px;'>Tiada kandungan aktif.</center>";
                return;
            }

            listDiv.innerHTML = activeIssues.map(i => {
                const labelObj = i.labels.find(lb => lb.name === 'post' || lb.name === 'poster');
                const labelName = labelObj ? labelObj.name : "Tiada Label";
                const tagClass = labelObj ? `tag-${labelObj.name}` : 'tag-none';
                
                return `
                <div class="issue-item">
                    <div style="flex:1; margin-right:10px;">
                        <div style="font-weight:600; font-size:15px;">${i.title}</div>
                        <span class="tag ${tagClass}">${labelName}</span>
                    </div>
                    <button class="del-btn" onclick="removeIssue(${i.number})">Padam</button>
                </div>
                `;
            }).join('');
        } catch(e) {
            listDiv.innerHTML = "Gagal memuatkan.";
        }
    }

    async function removeIssue(num) {
        if(!confirm("Pindah ke arkib (tukar label ke 'close')?")) return;
        showToast("Mengemaskini...");
        try {
            const res = await fetch(`https://api.github.com/repos/${REPO}/issues/${num}`, {
                method: 'PATCH',
                headers: {
                    'Authorization': `token ${AUTH_TOKEN}`,
                    'Accept': 'application/vnd.github+json',
                    'Content-Type': 'application/json'
                },
                body: JSON.stringify({ labels: ['close'], state: 'closed' })
            });
            if(res.ok) {
                showToast("🗑️ Telah dipadam");
                fetchIssues();
            }
        } catch(e) { alert("Ralat teknikal."); }
    }
</script>
</body>
</html>
